          items:
            $ref: "#/components/schemas/Pricing_PriorityRule"
      required:
        - rules
    Pricing_Stops:
      type: array
      description: A list of stops
      minItems: 2
      maxItems: 12
      items:
        $ref: "#/components/schemas/Pricing_Stop"
      example:
        - order: 0
          address:
            country: US
            city: Red Bluff
            state: CA
            zip: "96080"
        - order: 1
          address:
            country: US
            city: Redding
            state: CA
            zip: "96002"
    Pricing_Stop:
      type: object
      description: Contains the stop information e.g. address
      properties:
        order:
          type: integer
          description: Stop order, starting from 0
          example: 0
          minimum: 0
        address:
          $ref: "#/components/schemas/Pricing_Address"
      required:
        - order
        - address
    Pricing_Address:
      type: object
      description: >
        Location specified by country, city, state and zip code.

        * Country is required

        * Either city-state pair or zip code is required

        * All four parameters can be passed together


        (in case of city-state pair our platform will determine the zip code

        and in case of a zip code, our platform will determine the city and the state)
      properties:
        country:
          type: string
          description: Two letter country code in ISO 3166-1 alpha-2 format
          example: US
        state:
          type: string
          description: State
          example: NY
        city:
          type: string
          description: City
          example: Schenectady
        zip:
          type: string
          description: Zip
          example: "12345"
      required:
        - country
    Pricing_PricingResponse:
      type: object
      description: A collection of all the pricing options found
      properties:
        default:
          $ref: "#/components/schemas/Pricing_DefaultPricingCalculation"
        laneHistorical:
          $ref: "#/components/schemas/Pricing_PricingStatisticsCalculation"
        customerHistorical:
          $ref: "#/components/schemas/Pricing_PricingStatisticsCalculation"
        customerOnLaneHistorical:
          $ref: "#/components/schemas/Pricing_PricingStatisticsCalculation"
        priorityRule:
          $ref: "#/components/schemas/Pricing_PriorityRuleCalculation"
        combinationRules:
          $ref: "#/components/schemas/Pricing_CombinationRulesCalculation"
        suggested:
          $ref: "#/components/schemas/Pricing_SuggestedPricing"
        currency:
          type: string
          description: >
            Code of the currency of any monetary values in the response. 


            **Except flat pricing effect descriptors**, those have their own currencies. 


            Format is ISO 4217 (a three letter code e.g. 'USD')
          example: USD
      required:
        - currency
    Pricing_PricingRequest:
      type: object
      description: A set of fields used during pricing calculation
      properties:
        transportType:
          $ref: "#/components/schemas/Pricing_TransportType"
        stops:
          $ref: "#/components/schemas/Pricing_Stops"
        region:
          $ref: "#/components/schemas/Pricing_GeographicalAreaLane"
        customerName:
          type: string
          description: Customer name
          example: Test Customer
        pickupDate:
          type: string
          format: date-time
          description: Pick up date in time zone of origin
          example: "2020-01-13T16:00:00Z"
        deliveryDate:
          type: string
          format: date-time
          description: Delivery date in time zone of the destination
          example: "2020-01-13T16:00:00Z"
        weight:
          type: number
          format: float
          description: Weight of the cargo in lb
          example: 10000
        commodity:
          type: string
          description: Name of the commodity
          example: Apples
        targetBuyCost:
          type: number
          description: >
            The flat buy cost that the calculated pricing effect will be applied
            to, 

            in order to calculate the flat target sell cost
          example: 1000
        confidenceLevel:
          type: integer
          minimum: 0
          maximum: 100
          description: |
            Buy rate prediction confidence level 
            from the rate prediction endpoint response
          example: 65
        currency:
          $ref: "#/components/schemas/Pricing_Currency"
        pricingTypeGroup:
          $ref: "#/components/schemas/Pricing_PricingRuleGroup"
    Pricing_PricingMarketplaceMyBrokerPartnersRequest:
      type: object
      description: Data needed for calculating sell costs for a given lane
      properties:
        transportType:
          $ref: "#/components/schemas/Pricing_TransportType"
        stops:
          $ref: "#/components/schemas/Pricing_Stops"
        region:
          $ref: "#/components/schemas/Pricing_GeographicalAreaLane"
        customerName:
          type: string
          description: Customer name
          example: Test Customer
        pickupDate:
          type: string
          format: date-time
          description: Pick up date in time zone of origin
          example: "2020-01-13T16:00:00Z"
        deliveryDate:
          type: string
          format: date-time
          description: Delivery date in time zone of the destination
          example: "2020-01-13T16:00:00Z"
        weight:
          type: number
          format: float
          description: Weight of the cargo in lb
          example: 10000
        commodity:
          type: string
          description: Name of the commodity
          example: Apples
        currency:
          $ref: "#/components/schemas/Pricing_Currency"
        pricingTypeGroup:
          $ref: "#/components/schemas/Pricing_PricingRuleGroup"
      required:
        - transportType
        - stops
        - pickupDateTime
    Pricing_PricingMarketplaceMyBrokerPartnersResponse:
      type: object
      description: A response with a list of brokers and their sell rates
      properties:
        brokers:
          type: array
          description: |
            Array of brokers that signified that they want to work with you
            (participate in your marketplace)
          items:
            $ref: "#/components/schemas/Pricing_PricingMarketplaceMyBrokerPartnersResponseB\
              roker"
        currency:
          type: string
          description: |
            Code of the currency of any monetary values in the response. 

            Format is ISO 4217 (a three letter code e.g. 'USD')
          example: USD
      required:
        - brokers
        - currency
    Pricing_PricingMarketplaceMyBrokerPartnersResponseBroker:
      type: object
      description: A broker rate descriptor
      properties:
        mc:
          type: string
          description: Freight broker MC number
          example: MC00334234
        targetSellCost:
          type: number
          example: 1250
          description: >
            Flat target sell cost that this broker is willing to handle the load
            for
      required:
        - mc
        - targetSellCost
    Pricing_DefaultPricingCalculation:
      type: object
      description: |
        Contains the default pricing effects 
        and if possible a calculated `targetSellCost`
      properties:
        effects:
          $ref: "#/components/schemas/Pricing_DefaultPricingEffects"
        targetSellCost:
          type: number
          example: 1250
          description: >
            Flat target sell cost calculated by applying the default pricing
            effects

            to the provided flat buy cost
      required:
        - effects
    Pricing_SuggestedPricing:
      type: object
      description: >
        The pricing that we suggest to be used on this lane.


        This is based off of all the other pricing options found and 

        calculated using a priority algorithm. You can either trust us and use this

        to do your quote pricing, or you can choose from any of the other fields

        available in the response
      properties:
        name:
          type: string
          enum:
            - default
            - laneHistorical
            - customerHistorical
            - customerOnLaneHistorical
            - priorityRule
            - combinationRules
          description: |
            The name of the pricing option suggested to be used.

            The values are the names of the other fields of the response.
          example: priorityRule
        targetSellCost:
          type: number
          example: 1250
          description: >
            Flat target sell cost calculated by applying the suggested pricing
            effect 

            to the provided flat buy cost
      required:
        - name
    Pricing_CombinationRuleEffectsInput:
      type: object
      description: |
        The effects this rule will have on the price calculation.

        __Only one effect is allowed per rule__
      properties:
        percentageAdjustment:
          $ref: "#/components/schemas/Pricing_PercentageAdjustmentEffect"
        flatAdjustment:
          $ref: "#/components/schemas/Pricing_FlatAdjustmentEffectInput"
    Pricing_FlatAdjustmentEffectInput:
      type: object
      description: |
        In the default interpretation this effect increases the buy cost
        by a flat `amount` of the specified `currency` to get the sell cost
      properties:
        amount:
          type: number
          description: |
            The flat monetary amount by which the buy cost should be increased
          example: 15
        currency:
          $ref: "#/components/schemas/Pricing_Currency"
      required:
        - amount
    Pricing_RatePerMileAdjustmentEffectInput:
      type: object
      description: |
        In the default interpretation this effect increases the buy rate
        by an `amount` of the specified `currency` to get the sell cost
      properties:
        amount:
          type: number
          description: |
            The monetary amount by which the buy rate should be increased
          example: 0.15
        currency:
          $ref: "#/components/schemas/Pricing_Currency"
      required:
        - amount
    Pricing_SetSellCostEffectInput:
      type: object
      description: |
        In the default interpretation this effect 
        sets the specified `amount` of the specified `currency` 
        as the final sell cost
      properties:
        amount:
          type: number
          description: |
            The flat monetary amount to set as the sell cost
          example: 15
        currency:
          $ref: "#/components/schemas/Pricing_Currency"
      required:
        - amount
    Pricing_SetRatePerMileEffectInput:
      type: object
      description: |
        In the default interpretation this effect 
        sets the specified `amount` of the specified `currency` 
        as the final sell rate per mile
      properties:
        amount:
          type: number
          description: |
            The flat monetary amount to set as the sell rate per mile
          example: 3.15
        currency:
          $ref: "#/components/schemas/Pricing_Currency"
      required:
        - amount
    Pricing_PriorityRuleEffectsInput:
      type: object
      description: |
        The effects this rule will have on the price calculation.

        __Only one effect is allowed per rule__
      properties:
        percentageAdjustment:
          $ref: "#/components/schemas/Pricing_PercentageAdjustmentEffect"
        flatAdjustment:
          $ref: "#/components/schemas/Pricing_FlatAdjustmentEffectInput"
        setSellCost:
          $ref: "#/components/schemas/Pricing_SetSellCostEffectInput"
    Pricing_Currency:
      type: string
      enum:
        - USD
        - CAD
      description: |
        Currency code in ISO 4217 format (three letter code, e.g. USD)

        _If not provided, defaults to the currency set in the profile 
        of currently authenticated user (or currently authenticated company 
        if there is no user or user profile setting)_
      example: USD
    Pricing_Error:
      type: object
      description: A common api error object
      properties:
        code:
          type: string
          description: unique string identifier of the error
        message:
          type: string
          description: human readable error message
      required:
        - code
        - message
      example:
        code: invalid_request
        message: Your ClientId is invalid
    Pricing_Error422UnprocessableEntityMulti:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        errors:
          type: array
          description: list of errors
          items:
            $ref: "#/components/schemas/Pricing_RequestValidationError"
      required:
        - code
        - message
        - errors
      example:
        code: request_validation
        message: You have one or more errors in request structure
        errors:
          - field: carrierName
            message: field contains wrong data type (int), should be string
            value: "22"
          - field: shipperId
            message: "shipperId: must not be null"
            value: null
          - field: loadSource.loadId
            message: "loadId: must not be null"
            value: null
    Pricing_RequestValidationError:
      type: object
      description: Request validation error
      properties:
        field:
          type: string
          description: Name of the field that did not pass validation
          example: transportType
        message:
          type: string
          description: Human readable error mesage explaining why validation failed
          example: SpaceXDragon transportType is not supported. Valid values are [VAN,
            FLATBED, ...]
        value:
          type: string
          nullable: true
          description: Value of the field that did not pass validation
          example: SpaceXDragon
      required:
        - field
        - message
    Pricing_PricingTypeGroup:
      type: string
      description: |
        How this shipment was priced to the shipper in the following groupings
        (CONTRACT, SPOT, or OTHER)
      enum:
        - CONTRACT
        - SPOT
        - OTHER
      example: SPOT
    Pricing_PricingRuleGroup:
      type: string
      description: Pricing rule group filter. If not specified, all rules are returned.
      enum:
        - SPOT
        - CONTRACT
    Pricing_TransportType:
      type: string
      enum:
        - VAN
        - REEFER
        - FLATBED
        - HOTSHOT
      description: >
        Transport type


        If you would like Hotshot predictions, reach out to your CSM and DA. 

        The model will not work properly without your hotshot data effectively filtered and imported into the model.
      example: VAN
    Pricing_GeographicalAreaLane:
      type: string
      enum:
        - CITY
        - CITY_ZIP
        - ZIP_CITY
        - ZIP
      description: >
        Determines the size of the area around origin and destination points, 

        that will be searched for the related data.

        * CITY - narrow, city wide, area

        * ZIP - narrow, five digit zip, area

        * CITY_ZIP - a special option that sets origin area to CITY and destination area to ZIP

        * ZIP_CITY - a special option that sets origin area to ZIP and destination area to CITY
      example: ZIP
    Pricing_PriorityRuleEffects:
      type: object
      description: The effects this rule will have on the price calculation
      properties:
        percentageAdjustment:
          $ref: "#/components/schemas/Pricing_PercentageAdjustmentEffect"
        flatAdjustment:
          $ref: "#/components/schemas/Pricing_FlatAdjustmentEffect"
        setSellCost:
          $ref: "#/components/schemas/Pricing_SetSellCostEffect"
    Pricing_CombinationRuleEffects:
      type: object
      description: The effects this rule will have on the price calculation
      properties:
        percentageAdjustment:
          $ref: "#/components/schemas/Pricing_PercentageAdjustmentEffect"
        flatAdjustment:
          $ref: "#/components/schemas/Pricing_FlatAdjustmentEffect"
    Pricing_DefaultPricingEffects:
      type: object
      description: >
        The default pricing effects that are to be used for the sell cost
        calculation

        if no other pricing options are found
      properties:
        percentageAdjustment:
          $ref: "#/components/schemas/Pricing_PercentageAdjustmentEffect"
        flatAdjustment:
          $ref: "#/components/schemas/Pricing_FlatAdjustmentEffect"
        setSellCost:
          $ref: "#/components/schemas/Pricing_SetSellCostEffect"
    Pricing_PercentageAdjustmentEffect:
      type: object
      description: |
        In the default interpretation this effect marks up the buy cost
        by some `percentage` to get the sell cost
      properties:
        percentage:
          type: number
          description: The percentage by which the buy cost should be marked up
          example: 15
      required:
        - percentage
    Pricing_FlatAdjustmentEffect:
      type: object
      description: |
        In the default interpretation this effect increases the buy cost
        by a flat `amount` of the specified `currency` to get the sell cost
      properties:
        amount:
          type: number
          description: |
            The flat monetary amount by which the buy cost should be increased
          example: 15
        currency:
          type: string
          description: |
            Code of the currency used in this effect.
            Format is ISO 4217 (a three letter code e.g. 'USD')
          example: USD
      required:
        - amount
        - currency
    Pricing_RatePerMileAdjustmentEffect:
      type: object
      description: |
        In the default interpretation this effect increases the buy rate
        by an `amount` of the specified `currency` to get the sell rate
      properties:
        amount:
          type: number
          description: |
            The monetary amount by which the buy rate should be increased
          example: 0.5
        currency:
          type: string
          description: |
            Code of the currency used in this effect.
            Format is ISO 4217 (a three letter code e.g. 'USD')
          example: USD
      required:
        - amount
        - currency
    Pricing_SetSellCostEffect:
      type: object
      description: |
        In the default interpretation this effect 
        sets the specified `amount` of the specified `currency` 
        as the final sell cost
      properties:
        amount:
          type: number
          description: |
            The flat monetary amount to set as the sell cost
          example: 15
        currency:
          type: string
          description: |
            Code of the currency used in this effect.
            Format is ISO 4217 (a three letter code e.g. 'USD')
          example: USD
      required:
        - amount
        - currency
    Pricing_SetRatePerMileEffect:
      type: object
      description: |
        In the default interpretation this effect 
        sets the specified `amount` of the specified `currency` 
        as the final rate per mile
      properties:
        amount:
          type: number
          description: |
            The flat monetary amount to set as the sell rate per mile
          example: 3.5
        currency:
          type: string
          description: |
            Code of the currency used in this effect.
            Format is ISO 4217 (a three letter code e.g. 'USD')
          example: USD
      required:
        - amount
        - currency
    Pricing_ConfidenceLevelRange:
      type: object
      allOf:
        - $ref: "#/components/schemas/Pricing_IntegerRange"
      description: >
        Confidence level range to which the rule is applicable.


        At least one of the range boundaries has to be provided.


        If only one range boundary is provided, it means that the range is either 

        `<= 'to'` or `>= 'from'`
      properties:
        from:
          type: integer
          description: Minimum confidence level in miles
          minimum: 0
          maximum: 100
          example: 70
        to:
          type: integer
          description: Maximum confidence level in miles
          minimum: 0
          maximum: 100
          example: 100
    Pricing_RuleLane:
      type: object
      description: Lane description object
      properties:
        origins:
          $ref: "#/components/schemas/Pricing_RuleLocations"
        destinations:
          $ref: "#/components/schemas/Pricing_RuleLocations"
      required:
        - origins
        - destinations
    Pricing_RuleLocations:
      type: array
      description: A list of locations that the rule is applicable to
      items:
        $ref: "#/components/schemas/Pricing_RuleLocation"
      example:
        - type: ANYWHERE
        - type: STATE
          country: US
          state: IL
        - type: CITY
          country: US
          state: IL
          city: Chicago
        - type: MARKET
          country: US
          marketCode: NY_ALB
          marketName: Albany Market
    Pricing_RuleLocation:
      type: object
      description: A location that the rule is applicable to
      properties:
        type:
          type: string
          enum:
            - ANYWHERE
            - STATE
            - CITY
            - MARKET
          example: ANYWHERE
          description: >
            The location type. 


            For type ANYWHERE no fields are required.


            For type STATE - "country" and "state" fields are required.


            For type CITY - "country", "state" and "city" fields are required.


            For type MARKET - "country", "marketCode" and "marketName" fields are required.
        country:
          type: string
          description: Two letter country code in ISO 3166-1 alpha-2 format
          example: US
        state:
          type: string
          description: State
          example: NY
        city:
          type: string
          description: City
          example: Schenectady
        marketCode:
          type: string
          description: Market code
          example: NY_ALB
        marketName:
          type: string
          description: Market name
          example: Albany Market
      required:
        - type
    Pricing_LengthOfHaulRange:
      type: object
      allOf:
        - $ref: "#/components/schemas/Pricing_IntegerRange"
      description: >
        Range of the distance of the route to which the rule is applicable.


        At least one of the range boundaries has to be provided.


        If only one range boundary is provided, it means that the range is either 

        `<= 'to'` or `>= 'from'`
      properties:
        from:
          type: integer
          description: Minimum distance in miles
          minimum: 0
          example: 50
        to:
          type: integer
          description: Maximum distance in miles
          minimum: 0
          example: 250
    Pricing_WeightRange:
      type: object
      allOf:
        - $ref: "#/components/schemas/Pricing_IntegerRange"
      description: >
        Weight range, of the cargo, to which the rule is applicable.


        At least one of the range boundaries has to be provided.


        If only one range boundary is provided, it means that the range is either 

        `<= 'to'` or `>= 'from'`
      properties:
        from:
          type: integer
          description: Minimum weight in lb
          minimum: 0
          example: 0
        to:
          type: integer
          description: Maximum weight in lb
          minimum: 0
          example: 45000
    Pricing_MatchingTimeRange:
      type: object
      allOf:
        - $ref: "#/components/schemas/Pricing_FloatRange"
      description: >
        Matching time range to which the rule is applicable.


        At least one of the range boundaries has to be provided.


        If only one range boundary is provided, it means that the range is either 

        `<= 'to'` or `>= 'from'`
      properties:
        from:
          type: number
          format: float
          description: Minimum matching time in hours
          minimum: 0
          example: 20
        to:
          type: number
          format: float
          description: Maximum matching time in hours
          minimum: 0
          example: 30
    Pricing_TransitTimeRange:
      type: object
      allOf:
        - $ref: "#/components/schemas/Pricing_FloatRange"
      description: >
        Transit time range to which the rule is applicable.


        At least one of the range boundaries has to be provided.


        If only one range boundary is provided, it means that the range is either 

        `<= 'to'` or `>= 'from'`
      properties:
        from:
          type: number
          format: float
          description: Minimum transit time in hours
          minimum: 0
          example: 10
        to:
          type: number
          format: float
          description: Maximum transit time in hours
          minimum: 0
          example: 24
    Pricing_RuleConditions:
      type: object
      description: |
        Conditions in which this rule is applicable.

        When multuple conditions are provided the rule is only applied 
        if all of them are met
      properties:
        commodity:
          type: array
          description: >
            List of commodities to which the rule is applicable.

            At least one commodity from this list has to match for the rule to apply
          items:
            type: string
          example:
            - Apples
        confidenceLevel:
          $ref: "#/components/schemas/Pricing_ConfidenceLevelRange"
        customers:
          type: array
          description: >
            List of customers to which the rule is applicable. 

            At least one customer from this list has to match for the rule to apply
          items:
            type: string
            description: Customer name
          example:
            - LTR and Co
            - CocaCola
            - Walmart
        lanes:
          type: array
          description: |
            List of lanes to which the rule is applicable. 
            At least one lane from this list has to match for the rule to apply
          items:
            $ref: "#/components/schemas/Pricing_RuleLane"
        lengthOfHaul:
          $ref: "#/components/schemas/Pricing_LengthOfHaulRange"
        matchingTime:
          $ref: "#/components/schemas/Pricing_MatchingTimeRange"
        transitTime:
          $ref: "#/components/schemas/Pricing_TransitTimeRange"
        transportTypes:
          type: array
          maxItems: 2
          description: >
            List of transport types to which the rule is applicable.

            At least one transport type from this list has to match for the rule to apply
          items:
            $ref: "#/components/schemas/Pricing_TransportType"
        users:
          type: array
          description: |
            List of users to whom the rule is applicable. 
            At least one user from this list has to match for the rule to apply
          items:
            type: string
        weight:
          $ref: "#/components/schemas/Pricing_WeightRange"
        stopsCount:
          $ref: "#/components/schemas/Pricing_StopsCountRange"
        mileageDifference:
          $ref: "#/components/schemas/Pricing_MileageDifferenceRange"
    Pricing_CombinationRule:
      type: object
      description: Combination pricing rule
      properties:
        id:
          type: integer
          format: int64
          description: Id of the rule
          example: 12345
        name:
          type: string
          description: Name of the pricing rule
          example: Customer`s rule
        active:
          type: boolean
          description: Status of the rule
          example: false
        conditions:
          $ref: "#/components/schemas/Pricing_RuleConditions"
        effects:
          $ref: "#/components/schemas/Pricing_CombinationRuleEffects"
        pricingTypeGroup:
          $ref: "#/components/schemas/Pricing_PricingRuleGroup"
      required:
        - id
        - name
        - active
        - conditions
        - effects
    Pricing_PriorityRule:
      type: object
      description: Priority pricing rule
      properties:
        id:
          type: integer
          format: int64
          description: Id of the rule
          example: 12345
        name:
          type: string
          description: Name of the rule
          example: Customer`s rule
        priority:
          type: integer
          description: Priority of the rule
          example: 3
        active:
          type: boolean
          description: Status of the rule
          example: false
        conditions:
          $ref: "#/components/schemas/Pricing_RuleConditions"
        effects:
          $ref: "#/components/schemas/Pricing_PriorityRuleEffects"
        pricingTypeGroup:
          $ref: "#/components/schemas/Pricing_PricingRuleGroup"
      required:
        - id
        - name
        - priority
        - active
        - conditions
        - effects
    Pricing_PricingRatePerMileAndMileage:
      type: object
      description: |
        Composite object representing rate per miles and mileage
      properties:
        rate:
          type: number
          description: >
            The per mile buy rate that the calculated pricing effect will be
            applied to, 

            in order to calculate the target sell rate
          example: 3.4
        miles:
          type: number
          description: |
            Estimated miles for the trip
          example: 667
      required:
        - rate
        - miles
    Pricing_PricingRulesSearchRequest:
      type: object
      properties:
        filters:
          $ref: "#/components/schemas/Pricing_PricingRuleFilters"
    Pricing_PricingPriorityRulesSearchRequest:
      type: object
      allOf:
        - $ref: "#/components/schemas/Pricing_PricingRulesSearchRequest"
      properties:
        sorting:
          $ref: "#/components/schemas/Pricing_PricingPriorityRulesSorting"
    Pricing_PricingCombinationRulesSearchRequest:
      type: object
      allOf:
        - $ref: "#/components/schemas/Pricing_PricingRulesSearchRequest"
      properties:
        sorting:
          $ref: "#/components/schemas/Pricing_PricingCombinationRulesSorting"
    Pricing_PricingCombinationRulesSearchResponse:
      type: object
      description: Combination pricing rules search response
      properties:
        pagination:
          $ref: "#/components/schemas/Pricing_Pagination"
        items:
          type: array
          description: List of combination rules
          items:
            $ref: "#/components/schemas/Pricing_CombinationRule"
      required:
        - pagination
        - items
    Pricing_PricingPriorityRulesSearchResponse:
      type: object
      description: Priority pricing rules search response
      properties:
        pagination:
          $ref: "#/components/schemas/Pricing_Pagination"
        items:
          type: array
          description: List of rules
          items:
            $ref: "#/components/schemas/Pricing_PriorityRule"
      required:
        - pagination
        - items
    Pricing_PricingCheckRuleNameExistsResponse:
      type: object
      properties:
        value:
          type: boolean
          example: false
          description: |
            True if rule name already exists
      required:
        - value
    Pricing_PricingRuleFilters:
      type: object
      description: Rule filters
      properties:
        creationDateRange:
          type: object
          description: Date range to search for the report data
          properties:
            from:
              type: string
              format: date
              description: |
                Date to start the search from. 
                Format is ISO date. 
                Time zone is considered to be UTC.

                Defaults to a month ago from now.
              example: "2023-06-18"
            to:
              type: string
              format: date
              description: |
                Date to end the search at. 
                Format is ISO date. 
                Time zone is considered to be UTC.

                Defaults to today.
              example: "2023-10-18"
        transportTypeGroups:
          type: array
          description: Transport type groups to look for in the rule conditions
          items:
            type: string
            description: Transport type group
            enum:
              - VAN
              - REEFER
              - FLATBED
              - HOTSHOT
              - OTHER
            example: VAN
        origins:
          type: array
          description: >
            Origin locations.


            The most granular provided value is used for filtering. 

            e.g if the most granular value is:

            * zip - data will be filtered by zip code

            * city - data will be filtered by city (in this case state is required)

            * state - data will be filtered by state
          items:
            $ref: "#/components/schemas/Pricing_LocationFilter"
        destinations:
          type: array
          description: >
            Destination locations.


            The most granular provided value is used for filtering. 

            e.g if the most granular value is:

            * zip - data will be filtered by zip code

            * city - data will be filtered by city (in this case state is required)

            * state - data will be filtered by state
          items:
            $ref: "#/components/schemas/Pricing_LocationFilter"
        shippers:
          type: array
          description: Shipper company names to look for in the rule conditions
          items:
            type: string
            description: Shipper company name
            example: Walmart
        commodities:
          type: array
          description: list of commodities to look for in the rule conditions
          items:
            type: string
            description: Commodity description in free form
            example: Steel racks
        users:
          type: array
          description: Users to look for in the rule conditions
          items:
            type: string
            description: User
            example: user@greenscreens.ai
        distanceRanges:
          type: array
          description: Distance ranges to look for in the rule conditions
          items:
            $ref: "#/components/schemas/Pricing_DistanceRange"
        confidenceLevelRanges:
          type: array
          description: Confidence level ranges to look for in the rule conditions
          items:
            $ref: "#/components/schemas/Pricing_ConfidenceRangeFilter"
        ruleName:
          type: string
          description: Name part of pricing rule
          example: Extra long rule name 2
        transitTimeRanges:
          type: array
          description: Transit time ranges to look for in the rule conditions
          items:
            $ref: "#/components/schemas/Pricing_TransitTimeRangeFilter"
        matchingTimeRanges:
          type: array
          description: Matching time ranges to look for in the rule conditions
          items:
            $ref: "#/components/schemas/Pricing_MatchingTimeRangeFilter"
        weightRanges:
          type: array
          description: Weight ranges to look for in the rule conditions
          items:
            $ref: "#/components/schemas/Pricing_WeightRangeFilter"
        active:
          type: boolean
          description: Status of the rule
          example: false
        pricingTypeGroup:
          $ref: "#/components/schemas/Pricing_PricingRuleGroup"
    Pricing_PricingPriorityRulesSorting:
      type: object
      allOf:
        - $ref: "#/components/schemas/Pricing_PricingRulesSorting"
      description: |
        Sorting settings for the rule analytics table response
      properties:
        sortBy:
          type: string
          enum:
            - CREATION_DATE
            - RULE_NAME
            - STATUS
            - PRIORITY
          description: |
            The field that the response data should be sorted by
          default: STATUS
          example: CREATION_DATE
    Pricing_PricingCombinationRulesSorting:
      type: object
      allOf:
        - $ref: "#/components/schemas/Pricing_PricingRulesSorting"
      description: |
        Sorting settings for the rule analytics table response
      properties:
        sortBy:
          type: string
          enum:
            - CREATION_DATE
            - RULE_NAME
            - STATUS
          description: |
            The field that the response data should be sorted by
          default: STATUS
          example: CREATION_DATE
    Pricing_PricingRulesSorting:
      type: object
      description: |
        Sorting settings for the rule analytics table response
      properties:
        sortOrder:
          type: string
          enum:
            - ASCENDING
            - DESCENDING
          description: |
            Order in which the response data should be sorted
          default: DESCENDING
          example: ASCENDING
    Pricing_PricingRuleFilterValuesResponse:
      type: object
      properties:
        shippers:
          type: array
          description: |
            Shipper names present in the pricing rules
          items:
            type: string
            description: Shipper name
            example: Walmart
        users:
          type: array
          description: |
            User names present in the pricing rules
          items:
            type: string
            description: User name or code or email, etc.
            example: leroy.jenkins@greenscreens.ai
      required:
        - shippers
        - users
    Pricing_LocationFilter:
      type: object
      description: |
        Location descriptor used for filtering reports.

        The most granular provided value is used for filtering. 
        e.g if the most granular value is:
        * city - data will be filtered by city (in this case state is required)
        * state - data will be filtered by state
        * marketCode - data will be filtered by market code
      properties:
        country:
          type: string
          description: Two letter country code in ISO 3166-1 alpha-2 format
          example: US
        marketCode:
          type: string
          description: Market code
          example: NY_ALB
        state:
          type: string
          description: State
          example: NY
        city:
          type: string
          description: City
          example: Schenectady
      required:
        - country
    Pricing_DistanceRange:
      type: object
      description: Distance range (inclusive)
      properties:
        from:
          type: integer
          description: Start distance (inclusive)
          minimum: 0
          example: 1000
        to:
          type: integer
          description: End distance (inclusive)
          minimum: 0
          example: 1500
    Pricing_ConfidenceRangeFilter:
      type: object
      description: Confidence range to search for the report data
      properties:
        from:
          type: integer
          description: Confidence level to start the search from
          minimum: 0
          example: 76
          default: 0
        to:
          type: integer
          description: Confidence level to end the search at
          minimum: 0
          example: 87
          default: 100
    Pricing_TransitTimeRangeFilter:
      type: object
      description: |
        Transit time range filter
      properties:
        from:
          type: number
          format: float
          description: Minimum transit time in hours
          minimum: 0
          example: 10
        to:
          type: number
          format: float
          description: Maximum transit time in hours
          minimum: 0
          example: 24
    Pricing_WeightRangeFilter:
      type: object
      description: |
        Weight range filter
      properties:
        from:
          type: integer
          description: Minimum weight in lb
          minimum: 0
          example: 0
        to:
          type: integer
          description: Maximum weight in lb
          minimum: 0
          example: 45000
    Pricing_MatchingTimeRangeFilter:
      type: object
      description: |
        Matching time range filter
      properties:
        from:
          type: number
          format: float
          description: Minimum matching time in hours
          minimum: 0
          example: 20
        to:
          type: number
          format: float
          description: Maximum matching time in hours
          minimum: 0
          example: 30
    Pricing_Pagination:
      type: object
      description: Response pagination data
      properties:
        pageNumber:
          type: integer
          description: Current page number (zero-based)
          minimum: 0
          example: 0
        pageSize:
          type: integer
          description: Number of items per page
          minimum: 1
          example: 50
        totalElements:
          type: integer
          format: int64
          description: Total number of items available
          example: 150
        totalPages:
          type: integer
          description: Total number of pages
          example: 3
      required:
        - pageNumber
        - pageSize
    Pricing_IntegerRange:
      type: object
      properties:
        from:
          type: integer
          minimum: 0
          example: 50
        to:
          type: integer
          minimum: 0
          example: 250
    Pricing_FloatRange:
      type: object
      properties:
        from:
          type: number
          format: float
          minimum: 0
          example: 20
        to:
          type: number
          format: float
          minimum: 0
          example: 30
    Pricing_StopsCountRange:
      type: object
      description: >
        Range of the stops count of the route to which the rule is applicable.


        Stops count includes origin and destination i.e. route with one extra stop will have 3 stops in total.


        At least one of the range boundaries has to be provided.


        If only one range boundary is provided, it means that the range is either 

        `<= 'to'` or `>= 'from'`
      allOf:
        - $ref: "#/components/schemas/Pricing_IntegerRange"
      properties:
        from:
          type: integer
          minimum: 0
          description: Minimum stops count
          example: 3
        to:
          type: integer
          minimum: 0
          description: Maximum stops count
          example: 10
    Pricing_MileageDifferenceRange:
      type: object
      allOf:
        - $ref: "#/components/schemas/Pricing_IntegerRange"
      description: >
        Range of the stops count of the route to which the rule is applicable.


        At least one of the range boundaries has to be provided.


        If only one range boundary is provided, it means that the range is either

        `<= 'to'` or `>= 'from'`
      properties:
        from:
          type: integer
          description: Minimum difference in miles
          minimum: 0
          example: 50
        to:
          type: integer
          description: Maximum difference in miles
          minimum: 0
          example: 250
    Quotes_QuotesResponse:
      type: object
      description: Object containing an array of quotes
      properties:
        pagination:
          type: object
          description: Response pagination data
          properties:
            page:
              type: integer
              description: The number of the currently returned page
              minimum: 0
              example: 12
            perPage:
              type: integer
              description: The maximum number of items per page
              minimum: 1
              maximum: 500
              example: 20
          required:
            - page
            - perPage
        items:
          type: array
          description: Array of quotes
          items:
            $ref: "#/components/schemas/Quotes_QuoteObject"
      required:
        - pagination
        - items
    Quotes_QuotePatchRequest:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/Quotes_QuoteStatus"
        wasViewed:
          type: boolean
          description: |
            States whether the quote was viewed by a broker after being 
            accepted or rejected by a customer.
          example: false
        rejectionReason:
          type: string
          description: Comment about why the quote was rejected
          example: Customer rejected, because price was too high
        expirationDateTime:
          type: string
          format: date-time
          description: Quote expiration date and time in time zone of the user
          example: "2020-10-12T16:00:00+05:00"
    Quotes_QuoteFullUpdateRequest:
      type: object
      properties:
        shipper:
          $ref: "#/components/schemas/Quotes_Shipper"
        userEmail:
          type: string
          description: Email of the user who will be the owner/creator of the quote
          example: buddy@greenscreens.ai
        transportTypeGroup:
          type: string
          enum:
            - VAN
            - REEFER
            - FLATBED
            - HOTSHOT
          description: Transport type group
          example: VAN
        stops:
          $ref: "#/components/schemas/Quotes_StopsInput"
        distance:
          type: number
          format: float
          description: Distance of the route (in miles)
          example: 289
        expirationDateTime:
          type: string
          format: date-time
          description: Quote expiration date and time in time zone of the user
          example: "2020-10-12T16:00:00+05:00"
        pickupDateTime:
          type: string
          format: date-time
          description: Related load pickup date
          example: "2020-10-13T16:00:00Z"
        deliveredDateTime:
          type: string
          format: date-time
          description: Related load delivery date
          example: "2020-10-14T16:00:00Z"
        weight:
          type: number
          format: float
          description: Total cargo weight in lb
          example: 22000
        costs:
          $ref: "#/components/schemas/Quotes_CostsInput"
        currency:
          $ref: "#/components/schemas/Quotes_Currency"
      required:
        - userEmail
        - transportTypeGroup
        - stops
        - pickupDateTime
        - shipper
        - costs
    Quotes_QuoteObject:
      type: object
      description: Object representing a quote in our system
      properties:
        id:
          type: integer
          format: int64
          description: Id of the quote. Specific to our system and unique for every quote.
          example: 12345
        key:
          type: string
          description: Unique key used to create a link to the quote in the platform
          example: afd124faf-12raf-qfa2q-afvawf
        quoteId:
          type: string
          description: Unique quote id from the customers system
          example: Q#54321
        loadId:
          type: string
          description: Id of the load associated with this quote
          example: "12345"
        userEmail:
          type: string
          description: Email of the user who is the owner/creator of the quote
          example: buddy@greenscreens.ai
        transportType:
          type: string
          description: Transport type (original transport type used in provider TMS)
          example: VR
        transportTypeGroup:
          $ref: "#/components/schemas/Quotes_TransportTypeGroup"
        stops:
          $ref: "#/components/schemas/Quotes_Stops"
        distance:
          type: number
          format: float
          description: Distance of the route (in miles)
          example: 289
        pickupDateTime:
          type: string
          format: date-time
          description: Related load pickup date
          example: "2020-09-14T16:00:00Z"
        deliveredDateTime:
          type: string
          format: date-time
          description: Related load delivery date
          example: "2020-09-14T16:00:00Z"
        expirationDateTime:
          type: string
          format: date-time
          description: Expiration date and time in UTC time zone
          example: "2020-09-14T16:00:00Z"
        quoteDateTime:
          type: string
          format: date-time
          description: When the quote was sent to the customer
          example: "2020-10-13T16:00:00Z"
        defaultedQuoteDateTime:
          type: string
          format: date-time
          description: |
            Same as `quoteDateTime` but defaulted to `createdDateTime`, 
            if `quoteDateTime` is not available 
          example: "2020-09-14T16:00:00Z"
        createdDateTime:
          type: string
          format: date-time
          description: Quote creation date
          example: "2020-09-14T16:00:00Z"
        status:
          $ref: "#/components/schemas/Quotes_QuoteStatus"
        weight:
          type: number
          format: float
          description: Total cargo weight in lb
          example: 22000
        predictions:
          $ref: "#/components/schemas/Quotes_Predictions"
        wasViewed:
          type: boolean
          description: |
            Signifies whether the quote was viewed by a broker after being 
            accepted or rejected by a customer.
          example: false
        rejectionReason:
          type: string
          description: Comment about why the quote was rejected
          example: Rejecting, because price is too high
        shipper:
          $ref: "#/components/schemas/Quotes_Shipper"
        pricingType:
          type: string
          description: >
            How this shipment was priced to the shipper according to your
            methodology 

            (Primary, Backup, Spot, Spot_api, Spot_EDI, Primary_cost_plus, etc.)
          example: SPOT
        pricingTypeGroup:
          $ref: "#/components/schemas/Quotes_PricingTypeGroup"
        contractDuration:
          type: integer
          description: Contract duration in weeks, if applicable
          example: 5
        numberOfLoads:
          type: integer
          description: |
            Number of loads on the lane quoted or won:
            * for the day if a spot quote
            * for the duration of the contract if a primary or backup quote
          example: 10
        costs:
          $ref: "#/components/schemas/Quotes_Costs"
        currency:
          type: string
          description: >
            Currency of any monetary fields in this object (Three letter code,
            ISO 4217)
          example: USD
        notes:
          type: string
          description: |
            Optional free-text notes associated with this quote
          example: Do not dispatch before Monday
      required:
        - id
        - key
        - userEmail
        - transportTypeGroup
        - stops
        - pickupDateTime
        - defaultedQuoteDateTime
        - createdDateTime
        - status
        - wasViewed
        - costs
        - currency
    Quotes_Costs:
      type: object
      description: >
        Quote costs. 


        **Linehaul cost and either total cost or acessorials have to be provided 

        for this object to be valid.**
      properties:
        linehaul:
          type: number
          description: Flat linehaul cost that the customer was quoted
          example: 1200
        accessorials:
          $ref: "#/components/schemas/Quotes_Accessorials"
        total:
          type: number
          description: |
            Flat total cost that the customer was quoted 
            (linehaul + accessorials)
          example: 1500
      required:
        - linehaul
        - accessorials
        - total
    Quotes_CostsInput:
      type: object
      description: >
        Quote costs. 


        **Linehaul cost and either total cost or acessorials have to be provided 

        for this object to be valid.**
      properties:
        linehaul:
          type: number
          description: Flat linehaul cost that the customer was quoted
          example: 1200
        accessorials:
          $ref: "#/components/schemas/Quotes_AccessorialsInput"
        total:
          type: number
          description: |
            Flat total cost that the customer was quoted 
            (linehaul + accessorials)
          example: 1500
      required:
        - linehaul
    Quotes_Accessorials:
      type: array
      description: Quote accessorial list
      items:
        $ref: "#/components/schemas/Quotes_Accessorial"
    Quotes_Accessorial:
      type: object
      description: Contains the quote accessorial information e.g. name and cost
      properties:
        name:
          type: string
          description: Accessorial name
          example: Overweight
        cost:
          type: number
          description: Flat accessorial cost
          example: 200.5
      required:
        - name
        - cost
    Quotes_AccessorialsInput:
      type: array
      description: Quote accessorial list
      items:
        $ref: "#/components/schemas/Quotes_AccessorialInput"
    Quotes_AccessorialInput:
      type: object
      description: Contains the quote accessorial information e.g. name and cost
      nullable: true
      properties:
        name:
          type: string
          description: Accessorial name
          example: Overweight
        cost:
          type: number
          description: Flat accessorial cost
          example: 200.5
      required:
        - name
        - cost
    Quotes_Stops:
      type: array
      description: Quote stop list
      minItems: 2
      items:
        $ref: "#/components/schemas/Quotes_Stop"
      example:
        - order: 0
          address:
            country: US
            city: Red Bluff
            state: CA
            zip: "96080"
            type: CITY
          type: LOAD
          appointmentDateTime: "2020-10-13T16:00:00Z"
        - order: 1
          address:
            country: US
            city: Redding
            state: CA
            zip: "96002"
            type: ZIP
          type: UNLOAD
          appointmentDateTime: "2020-10-14T16:00:00Z"
    Quotes_StopsInput:
      type: array
      description: Quote stop list
      minItems: 2
      items:
        $ref: "#/components/schemas/Quotes_StopInput"
      example:
        - order: 0
          address:
            country: US
            city: Red Bluff
            state: CA
            zip: "96080"
          type: LOAD
          appointmentDateTime: "2020-10-13T16:00:00Z"
        - order: 1
          address:
            country: US
            city: Redding
            state: CA
            zip: "96002"
          type: UNLOAD
          appointmentDateTime: "2020-10-14T16:00:00Z"
    Quotes_StopsInputLaneTopQuotes:
      type: array
      description: Quote stop list
      minItems: 2
      items:
        $ref: "#/components/schemas/Quotes_StopInputLaneTopQuotes"
      example:
        - order: 0
          address:
            country: US
            city: Red Bluff
            state: CA
            zip: "96080"
        - order: 1
          address:
            country: US
            city: Redding
            state: CA
            zip: "96002"
    Quotes_Stop:
      type: object
      description: Contains the quote stop information e.g. address
      properties:
        order:
          type: integer
          description: Stop order, starting from 0
          example: 0
        address:
          $ref: "#/components/schemas/Quotes_Address"
        type:
          type: string
          description: |
            Action performed with the cargo at this stop
          enum:
            - LOAD
            - UNLOAD
            - BOTH
          example: LOAD
        appointmentDateTime:
          type: string
          format: date-time
          description: |
            Date and time when the truck has to arrive at this stop
          example: "2020-10-13T16:00:00Z"
      required:
        - order
        - address
    Quotes_StopInput:
      type: object
      description: Contains the quote stop information e.g. address
      properties:
        order:
          type: integer
          description: Stop order, starting from 0
          example: 0
        address:
          $ref: "#/components/schemas/Quotes_AddressInput"
        type:
          type: string
          description: |
            Action performed with the cargo at this stop.

            Leave this field empty if you do not know the stop type.
          enum:
            - LOAD
            - UNLOAD
            - BOTH
          example: LOAD
        appointmentDateTime:
          type: string
          format: date-time
          description: |
            Date and time when the truck has to arrive at this stop.

            Provide the time zone of the stop location if possible.
          example: "2020-10-13T16:00:00Z"
      required:
        - order
        - address
    Quotes_StopInputLaneTopQuotes:
      type: object
      description: Contains the quote stop information e.g. address
      properties:
        order:
          type: integer
          description: Stop order, starting from 0
          example: 0
        address:
          $ref: "#/components/schemas/Quotes_AddressInputLaneTopQuotes"
      required:
        - order
        - address
    Quotes_Address:
      type: object
      description: >
        Location specified by country, city, state and zip code.

        * Country is required

        * Either city-state pair or zip code is required

        * All four parameters can be passed together


        (in case of city-state pair our platform will determine the zip code

        and in case of a zip code, our platform will determine the city and the state)
      properties:
        country:
          type: string
          description: Two letter country code in ISO 3166-1 alpha-2 format
          example: US
        state:
          type: string
          description: state
          example: NY
        city:
          type: string
          description: city
          example: Schenectady
        zip:
          type: string
          description: zip
          example: "12345"
        type:
          type: string
          enum:
            - CITY
            - ZIP
          example: ZIP
          description: Type of address. Defaults to ZIP if not provided.
          default: ZIP
      required:
        - country
        - type
    Quotes_AddressInput:
      type: object
      description: >
        Location specified by country, city, state and zip code.

        * Country is required

        * Either city-state pair or zip code is required

        * All four parameters can be passed together


        (in case of city-state pair our platform will determine the zip code

        and in case of a zip code, our platform will determine the city and the state)
      properties:
        country:
          type: string
          description: Two letter country code in ISO 3166-1 alpha-2 format
          example: US
        state:
          type: string
          description: state
          example: NY
        city:
          type: string
          description: city
          example: Schenectady
        zip:
          type: string
          description: zip
          example: "12345"
      required:
        - country
    Quotes_AddressInputLaneTopQuotes:
      type: object
      description: |
        Location specified by country, city, state and zip code
      properties:
        country:
          type: string
          description: Two letter country code in ISO 3166-1 alpha-2 format
          example: US
        state:
          type: string
          description: state
          example: NY
        city:
          type: string
          description: city
          example: Schenectady
        zip:
          type: string
          description: zip
          example: "12345"
      required:
        - country
        - state
        - city
        - zip
    Quotes_Shipper:
      type: object
      description: Shipper data
      properties:
        id:
          type: string
          description: Customer TMS ID of the shipper profile associated with this quote
          example: "64378901"
        name:
          type: string
          description: Shipper company name
          example: Walmart
        phone:
          type: string
          description: Shipper contact phone number
          example: "4112228888"
        email:
          type: string
          description: Shipper contact email
          example: test@greenscreens.ai
    Quotes_Predictions:
      type: object
      description: |
        Predictions made for this quote.

        The fields in this object are populated asynchronously,
        so there might be a period in time when you will not see any values.
      properties:
        company:
          type: object
          description: Company specific predictions
          properties:
            buy:
              type: object
              description: Buy cost related properties
              properties:
                target:
                  type: number
                  description: Flat buy cost that our system would suggest to use for buying such
                    a load
                  example: 1200
                start:
                  type: number
                  description: Flat buy cost that our system would suggest to use as the lower
                    limit during bargaining with the carrier
                  example: 1200
                high:
                  type: number
                  description: Flat buy cost that our system would suggest to use as the upper
                    limit during bargaining with the carrier
                  example: 1200
                confidenceLevel:
                  type: integer
                  minimum: 0
                  maximum: 100
                  description: |
                    How confident the system is in the prediction it is making. 

                    From 0 - lowest possible confidence\
                    To 100 - highest possible confidence
                  example: 65
            sell:
              type: object
              description: Sell cost related properties
              properties:
                target:
                  type: number
                  description: Flat sell cost that our system would suggest to use for this quote
                  example: 1200
        network:
          type: object
          description: Network predictions
          properties:
            buy:
              type: object
              description: Buy cost related properties
              properties:
                target:
                  type: number
                  description: Flat buy cost that our system would suggest to use for buying such
                    a load
                  example: 1200
                confidenceLevel:
                  type: integer
                  minimum: 0
                  maximum: 100
                  description: |
                    How confident the system is in the prediction it is making. 

                    From 0 - lowest possible confidence\
                    To 100 - highest possible confidence
                  example: 65
        distance:
          type: number
          format: float
          description: Distance of the route (in miles)
          example: 289
    Quotes_QuotesImportRequest:
      type: object
      description: A body of the request to import a quote
      properties:
        quoteId:
          type: string
          description: |
            Unique quote id from the customers system. 

            If a quote with the same quoteId will be found in our platform, 
            it will be updated. Otherwise a new quote will be created
          example: Q#54321
        loadId:
          type: string
          description: Id of the load associated with this quote
          example: "12345"
        userEmail:
          type: string
          description: Email of the user who will be the owner/creator of the quote
          example: buddy@greenscreens.ai
        transportType:
          type: string
          description: Transport type (original transport type used in provider TMS)
          example: VR
        transportTypeGroup:
          $ref: "#/components/schemas/Quotes_TransportTypeGroup"
        stops:
          $ref: "#/components/schemas/Quotes_StopsInput"
        distance:
          type: number
          format: float
          description: Distance of the route (in miles)
          example: 289
        pickupDateTime:
          type: string
          format: date-time
          description: Related load pickup date
          example: "2020-10-13T16:00:00Z"
        deliveredDateTime:
          type: string
          format: date-time
          description: Related load delivery date
          example: "2020-10-14T16:00:00Z"
        expirationDateTime:
          type: string
          format: date-time
          description: Quote expiration date and time in time zone of the user
          example: "2020-10-12T16:00:00+05:00"
        quoteDateTime:
          type: string
          format: date-time
          description: When the quote was sent to the customer
          example: "2020-10-13T16:00:00Z"
        status:
          $ref: "#/components/schemas/Quotes_QuoteStatus"
        rejectionReason:
          type: string
          description: Comment about why the quote was rejected
          example: Rejecting, because price is too high
        weight:
          type: number
          format: float
          description: Total cargo weight in lb
          example: 22000
        shipper:
          $ref: "#/components/schemas/Quotes_Shipper"
        pricingType:
          type: string
          description: >
            How this shipment was priced to the shipper according to your
            methodology 

            (Primary, Backup, Spot, Spot_api, Spot_EDI, Primary_cost_plus, etc.)
          example: SPOT
        pricingTypeGroup:
          $ref: "#/components/schemas/Quotes_PricingTypeGroup"
        contractDuration:
          type: integer
          description: Contract duration in weeks, if applicable
          example: 5
        numberOfLoads:
          type: integer
          description: |
            Number of loads on the lane quoted or won:
            * for the day if a spot quote
            * for the duration of the contract if a primary or backup quote
          example: 10
        costs:
          $ref: "#/components/schemas/Quotes_CostsInput"
        currency:
          $ref: "#/components/schemas/Quotes_Currency"
      required:
        - quoteId
        - userEmail
        - transportType
        - transportTypeGroup
        - stops
        - pickupDateTime
        - status
        - shipper
        - pricingType
        - pricingTypeGroup
        - costs
        - currency
    Quotes_QuotesImportResponse:
      type: object
      description: Quote import response
      properties:
        status:
          type: string
          enum:
            - CREATED
            - UPDATED
          description: |
            Quote creation status. 
            * CREATED - a new quote was created
            * UPDATED - an existing quote was updated
          example: CREATED
      required:
        - status
    Quotes_QuotesBatchImportRequest:
      type: object
      properties:
        quotes:
          type: array
          description: List of quotes to import
          items:
            $ref: "#/components/schemas/Quotes_QuotesImportRequest"
          maxItems: 1000
      required:
        - quotes
    Quotes_QuotesBatchImportResponse:
      type: object
      properties:
        responses:
          type: array
          description: List of quote import responses
          items:
            $ref: "#/components/schemas/Quotes_QuotesBatchImportResponseItem"
      required:
        - responses
    Quotes_QuotesBatchImportResponseItem:
      type: object
      description: |
        Response for this particular quote import attempt
      properties:
        quoteId:
          type: string
          description: Unique quote id from the customers system
          example: Q#54321
        status:
          type: string
          enum:
            - CREATED
            - UPDATED
