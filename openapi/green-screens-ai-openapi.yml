    Quotes_Error:
      type: object
      description: A common api error object
      properties:
        code:
          type: string
          description: unique string identifier of the error
        message:
          type: string
          description: human readable error message
      required:
        - code
        - message
      example:
        code: invalid_request
        message: Your ClientId is invalid
    Quotes_Error422UnprocessableEntityMulti:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        errors:
          type: array
          description: list of errors
          items:
            $ref: "#/components/schemas/Quotes_RequestValidationError"
      required:
        - code
        - message
        - errors
      example:
        code: request_validation
        message: You have one or more errors in request structure
        errors:
          - field: carrierName
            message: field contains wrong data type (int), should be string
            value: "22"
          - field: shipperId
            message: "shipperId: must not be null"
            value: null
          - field: loadSource.loadId
            message: "loadId: must not be null"
            value: null
    Quotes_RequestValidationError:
      type: object
      description: Request validation error
      properties:
        field:
          type: string
          description: Name of the field that did not pass validation
          example: transportType
        message:
          type: string
          description: Human readable error mesage explaining why validation failed
          example: SpaceXDragon transportType is not supported. Valid values are [VAN,
            FLATBED, ...]
        value:
          type: string
          nullable: true
          description: Value of the field that did not pass validation
          example: SpaceXDragon
      required:
        - field
        - message
    Quotes_Currency:
      type: string
      enum:
        - USD
        - CAD
      description: |
        Currency code in ISO 4217 format (three letter code, e.g. USD)

        _If not provided, defaults to the currency set in the profile 
        of currently authenticated user (or currently authenticated company 
        if there is no user or user profile setting)_
      example: USD
    Quotes_GeographicalArea:
      type: string
      enum:
        - CITY
        - CITY_ZIP
        - ZIP_CITY
        - ZIP
        - 3DZIP
        - KMA
      description: >
        Determines the size of the area around the origin and destination
        points, 

        that will be searched for the related data.

        * CITY - narrow, city wide, area

        * ZIP - narrow, five digit zip, area

        * 3DZIP - medium, short zip, area

        * KMA - big, market wide, area

        * CITY_ZIP - a special option that sets origin area to CITY and destination area to ZIP

        * ZIP_CITY - a special option that sets origin area to ZIP and destination area to CITY
      example: ZIP
    Quotes_PricingTypeGroup:
      type: string
      description: |
        How this shipment was priced to the shipper in the following groupings
        (CONTRACT, SPOT, or OTHER)
      enum:
        - CONTRACT
        - SPOT
        - OTHER
      example: SPOT
    Quotes_QuoteStatus:
      type: string
      description: Quote lifecycle stage
      enum:
        - WON
        - LOST
        - SENT
        - EXPIRED
      example: WON
    Quotes_TransportTypeGroup:
      type: string
      description: Transport type group
      enum:
        - VAN
        - REEFER
        - FLATBED
        - HOTSHOT
        - OTHER
      example: VAN
    TmsConnector_ImportLoadRequest:
      type: object
      properties:
        loadId:
          type: string
          description: >
            Unique load id from external TMS. 


            If a load with same loadId will be found in our platform during import, 

            it will be updated. Otherwise a new load will be created.
          example: "12345"
        origin:
          $ref: "#/components/schemas/TmsConnector_StopLocation"
        destination:
          $ref: "#/components/schemas/TmsConnector_StopLocation"
        extraStops:
          $ref: "#/components/schemas/TmsConnector_ExtraStops"
        rate:
          $ref: "#/components/schemas/TmsConnector_Rate"
        pickupDate:
          type: string
          format: date-time
          description: >
            Pick up date in ISO date format in the time zone of the pick up
            location
          example: "2021-09-21T13:00:00-04:00"
        deliveredDate:
          type: string
          format: date-time
          description: >
            Delivery date in ISO date format in the time zone of the drop off
            location
          example: "2021-09-22T18:00:00-04:00"
        transportType:
          type: string
          description: Transport type (original transport type used in provider TMS)
          example: VR
        transportTypeGroup:
          $ref: "#/components/schemas/TmsConnector_TransportTypeGroup"
        transportMode:
          type: string
          enum:
            - FTL
            - LTL
            - PARCEL
            - INTERMODAL
            - OTHER
          description: Transport mode
          default: FTL
          example: FTL
        status:
          type: string
          enum:
            - OPEN
            - COVERED
            - PICKUP
            - LOADED
            - STOP
            - DROPOFF
            - DELIVERED
            - TENDER_REJECTED
            - CLOSED
            - CANCELED
            - OTHER
          description: |
            Load status.

            * OPEN - Created
            * COVERED - Carrier assigned
            * PICKUP - On the pickup stop
            * LOADED - In transit
            * STOP - On the extra stop
            * DROPOFF - On the drop off stop
            * DELIVERED - Delivered
            * TENDER_REJECTED - Tender is rejected
            * CLOSED - All money paid. Processing over
            * CANCELED - Canceled
            * OTHER - Any other status, not mentioned in this enum
          example: OPEN
        details:
          $ref: "#/components/schemas/TmsConnector_Details"
        shipper:
          $ref: "#/components/schemas/TmsConnector_Shipper"
        carrier:
          $ref: "#/components/schemas/TmsConnector_Carrier"
      required:
        - loadId
        - origin
        - destination
        - rate
        - pickupDate
        - transportTypeGroup
        - transportType
    TmsConnector_ImportLoadResponse:
      type: object
      properties:
        id:
          type: string
          description: Id of the load used to identify it in our platform
          example: c6447366-9700-4851-854b-2bb41f03cde0
        loadId:
          type: string
          description: Id of the load provided by the client in the import request
          example: pr0-003
        status:
          type: string
          enum:
            - CREATED
            - UPDATED
          description: >
            Result of the load import operation: 

            * CREATED - means that a new load was created 

            * UPDATED - means that a load with the same loadId was found and updated
          example: CREATED
      required:
        - id
        - loadId
        - status
    TmsConnector_ImportLoadForProviderRequest:
      type: object
      properties:
        brokerId:
          type: string
          description: >
            Id of the company that you want the load to be imported in
            to.  (this is an id you receive when registering a new company with
            us)
          example: 6F9619FF-8B86-D011-B42D-00CF4FC964FF
      required:
        - brokerId
      allOf:
        - $ref: "#/components/schemas/TmsConnector_ImportLoadRequest"
    TmsConnector_BatchImportLoadRequest:
      type: object
      properties:
        loads:
          type: array
          description: List of loads to import or update
          items:
            $ref: "#/components/schemas/TmsConnector_ImportLoadRequest"
      required:
        - loads
    TmsConnector_BatchImportLoadResponse:
      type: object
      properties:
        responses:
          type: array
          description: List of load batch import results
          items:
            $ref: "#/components/schemas/TmsConnector_BatchImportLoadResponseItem"
      required:
        - responses
    TmsConnector_BatchImportLoadResponseItem:
      type: object
      description: Import result data for a particular load from the imported batch
      properties:
        id:
          type: string
          description: Load Id in the platform
          example: c6447366-9700-4851-854b-2bb41f03cde0
        loadId:
          type: string
          description: Unique internal load identifier from TMS
          example: pr0-003
        status:
          type: string
          enum:
            - CREATED
            - UPDATED
            - ERROR
          description: |
            Load import status. 
            * CREATED - a new load was imported
            * UPDATED - an existing load was updated
            * ERROR - an error occurred during load import
          example: CREATED
        code:
          type: string
          description: When status is ERROR, contains a unique string identifier of the
            error
          example: validation_errors_occured
        message:
          type: string
          description: When status is ERROR, contains a human readable error message
          example: Validation errors occured, check errors array for details
        errors:
          type: array
          description: A list of validation errors that occurred during import.
          items:
            $ref: "#/components/schemas/TmsConnector_RequestValidationError"
      required:
        - id
        - loadId
        - status
    TmsConnector_BatchImportLoadForProviderRequest:
      type: object
      properties:
        brokerId:
          type: string
          description: >
            Id of the company that you want the load batch to be imported in
            to.  (this is an id you receive when registering a new company with
            us)
          example: 6F9619FF-8B86-D011-B42D-00CF4FC964FF
      required:
        - brokerId
      allOf:
        - $ref: "#/components/schemas/TmsConnector_BatchImportLoadRequest"
    TmsConnector_BatchImportCarrierRequest:
      type: object
      properties:
        carriers:
          type: array
          description: List of carriers to import or update
          items:
            $ref: "#/components/schemas/TmsConnector_CarrierProfile"
      required:
        - carriers
    TmsConnector_BatchImportShipperRequest:
      type: object
      properties:
        shippers:
          type: array
          description: List of shipper profiles to import or update
          items:
            $ref: "#/components/schemas/TmsConnector_ShipperProfile"
      required:
        - shippers
    TmsConnector_BatchImportProfileResponse:
      type: object
      properties:
        responses:
          type: array
          description: List of profile batch import results
          items:
            $ref: "#/components/schemas/TmsConnector_BatchImportProfileResponseItem"
      required:
        - responses
    TmsConnector_BatchImportProfileResponseItem:
      type: object
      description: Import result data for a particular profile from the imported batch
      properties:
        id:
          type: string
          description: Id of the profile used to identify it in our platform
          example: c6447366-9700-4851-854b-2bb41f03cde0
        profileId:
          type: string
          description: Id of the profile provided by the client in the import request
          example: pr0-003
        status:
          type: string
          enum:
            - CREATED
            - UPDATED
            - ERROR
          description: >
            Result of the profile import operation: 

            * CREATED - means that a new profile was created 

            * UPDATED - means that a profile with the same profileId was found and updated

            * ERROR - an error occurred during profile import
          example: CREATED
        code:
          type: string
          description: When status is ERROR, contains a unique string identifier of the
            error
          example: validation_errors_occured
        message:
          type: string
          description: When status is ERROR, contains a human readable error message
          example: Validation errors occured, check errors array for details
        errors:
          type: array
          description: A list of validation errors that occurred during import.
          items:
            $ref: "#/components/schemas/TmsConnector_RequestValidationError"
      required:
        - profileId
        - status
    TmsConnector_Rate:
      type: object
      description: Load rate data
      properties:
        totalShipperLinehaulCost:
          type: number
          minimum: 0
          description: |
            Original agreed to price with the shipper. 
            Including fuel. 
            No accessorials
          example: 1176
        totalLinehaulCost:
          type: number
          minimum: 0
          description: |
            Load linehaul cost for the carrier.
            Including fuel.
            No accessorials.
          example: 956
        totalFuelCost:
          type: number
          minimum: 0
          description: Fuel surcharge for the load
          example: 45
        accessorials:
          $ref: "#/components/schemas/TmsConnector_Accessorials"
        totalShipperCost:
          type: number
          minimum: 0
          description: Total load cost for shipper including fuel and accessorials
          example: 1276
        totalCarrierCost:
          type: number
          minimum: 0
          description: Total load cost for carrier including fuel and accessorials
          example: 1130
        currency:
          type: string
          description: >
            Currency in which the costs were provided (ISO 4217). Defaults to
            USD.
          example: USD
      required:
        - totalLinehaulCost
    TmsConnector_Details:
      type: object
      description: Additional optional data about the load.
      properties:
        distance:
          type: number
          format: float
          description: |
            Distance between origin and destination. In miles.
          example: 434
        miles:
          type: number
          format: float
          description: >
            Total miles between origin and destination  (this field is
            deprecated, use 'distance' instead)
          example: 434
          deprecated: true
        commodity:
          type: string
          description: Commodity discription in free form
          example: Racks
        weight:
          type: number
          format: float
          description: Total cargo weight in lb
          example: 22000
        tenderedDate:
          type: string
          format: date-time
          description: Date when load was tendered
          example: "2020-01-11T16:00:00Z"
        bookedDate:
          type: string
          format: date-time
          description: Date when carrier was assigned to the load
          example: "2020-01-11T16:00:00Z"
        tordFlag:
          type: boolean
          description: \"Truck order not used\" flag
          example: false
        hazmat:
          type: boolean
          description: Hazmat endorsement is needed for this load
          example: false
        hotshot:
          type: boolean
          description: This signifies whether hotshot is used
          example: false
        teamDrive:
          type: boolean
          description: Signifies whether team drivers are needed for the load
          example: false
        overdimensional:
          type: boolean
          description: Signifies whether the load is overdimensional or not
          example: false
        dedicatedCarrierContract:
          type: boolean
          description: Signifies whether there was a dedicated contract with the carrier
            on the load
          example: false
        asset:
          type: boolean
          description: Signifies whether the load is an asset load
          example: false
        pricingType:
          type: string
          description: >
            How this shipment was priced to the shipper according to your
            methodology 

            (Primary, Backup, Spot, Spot_api, Spot_EDI, Primary_cost_plus, Contract, etc.)
          example: Spot
        pricingTypeGroup:
          $ref: "#/components/schemas/TmsConnector_PricingTypeGroup"
        carrierAccountManager:
          type: string
          description: |
            Carrier account manager. Aka Buy side rep or Operational rep. 

            The person that found/bought carrier services for this shipment.
          example: John Doe
        shipperAccountManager:
          type: string
          description: >
            Shipper account manager. Aka Account Manager.


            The person that "owns" the ongoing care and support of the shipper/customer

            that this shipment belongs to. 


            Sometimes this manager is also the Sales manager.
          example: John Doe
        salesManager:
          type: string
          description: >
            Sales manager. 


            The person that made the sale (found the shipper/customer and signed him).


            Can sometimes be the same person who is the Shipper account manager.
          example: John Doe
        userGroupId:
          type: string
          description: |
            A unique identifier (id) of a user group, 
            that this load belongs to. e.g. Main company or an Agency
          example: Main office
        office:
          type: string
          description: |
            Name of an office in your company that this load belongs to
          example: Main office
    TmsConnector_Carrier:
      type: object
      description: Carrier data
      properties:
        id:
          type: string
          description: Carrier ID
          example: "12345"
        name:
          type: string
          description: Carrier company name
          example: Carrier company
      required:
        - id
    TmsConnector_Shipper:
      type: object
      description: Shipper data
      properties:
        id:
          type: string
          description: Shipper ID
          example: "12345"
        name:
          type: string
          description: Shipper company name
          example: Shipper company
      required:
        - id
    TmsConnector_ExtraStops:
      type: array
      items:
        $ref: "#/components/schemas/TmsConnector_ExtraStop"
      description: >
        Any extra stops along the route between the origin and destination points
      example:
        - order: 0
          address:
            country: US
            city: Red Bluff
            state: CA
            zip: "96080"
          type: LOAD
          appointmentDateTime: "2020-10-14T16:00:00Z"
        - order: 1
          address:
            country: US
            city: Redding
            state: CA
            zip: "96002"
          type: UNLOAD
          appointmentDateTime: "2020-10-15T16:00:00Z"
    TmsConnector_ExtraStop:
      type: object
      description: Extra stop
      properties:
        order:
          type: integer
          description: Extra stop order, starting from 0
          example: 0
        address:
          $ref: "#/components/schemas/TmsConnector_ExtraStopAddress"
        type:
          type: string
          description: |
            Action performed with the cargo at this stop.

            Leave this field empty if you do not know the stop type.
          enum:
            - LOAD
            - UNLOAD
            - BOTH
          example: LOAD
        appointmentDateTime:
          type: string
          format: date-time
          description: |
            Date and time when the truck has to arrive at this stop.

            Provide the time zone of the stop location if possible.
          example: "2020-10-13T16:00:00Z"
        scheduledAppointmentStartedAt:
          type: string
          format: date-time
          description: |
            Start of the scheduled appointment window at this stop.

            Provide the time zone of the stop location if possible.
          example: "2020-10-13T09:00:00Z"
        scheduledAppointmentEndedAt:
          type: string
          format: date-time
          description: |
            End of the scheduled appointment window at this stop.

            Provide the time zone of the stop location if possible.
          example: "2020-10-13T11:00:00Z"
        arrivedAt:
          type: string
          format: date-time
          description: |
            Actual arrival date and time at this stop.

            Provide the time zone of the stop location if possible.
          example: "2020-10-13T09:15:00Z"
        departedAt:
          type: string
          format: date-time
          description: |
            Actual departure date and time from this stop.

            Provide the time zone of the stop location if possible.
          example: "2020-10-13T10:45:00Z"
      required:
        - order
        - address
    TmsConnector_ExtraStopAddress:
      type: object
      description: >
        Location specified by country, city, state and zip code.

        * Country is required

        * Either city-state pair or zip code is required

        * All four parameters can be passed together


        (in case of city-state pair our platform will determine the zip code

        and in case of a zip code, our platform will determine the city and the state)
      properties:
        country:
          type: string
          description: Two letter country code in ISO 3166-1 alpha-2 format
          example: US
        city:
          type: string
          description: City name
          example: Sacramento
        state:
          type: string
          description: Two letter state code
          example: CA
        zip:
          type: string
          description: Zip code
          example: "95814"
      required:
        - country
    TmsConnector_StopLocation:
      type: object
      description: >
        Location specified by country, city, state and zip code.

        * Country is required

        * Either city-state pair or zip code is required

        * All four parameters can be passed together


        (in case of city-state pair our platform will determine the zip code

        and in case of a zip code, our platform will determine the city and the state)
      properties:
        country:
          type: string
          description: Two letter country code in ISO 3166-1 alpha-2 format
          example: US
        city:
          type: string
          description: City name
          example: Sacramento
        state:
          type: string
          description: Two letter state code
          example: CA
        zip:
          type: string
          description: Zip code
          example: "95814"
        appointmentDateTime:
          type: string
          format: date-time
          description: |
            Date and time when the truck has to arrive at this stop.

            Provide the time zone of the stop location if possible.
          example: "2020-10-13T09:00:00Z"
        scheduledAppointmentStartedAt:
          type: string
          format: date-time
          description: |
            Start of the scheduled appointment window at this stop.

            Provide the time zone of the stop location if possible.
          example: "2020-10-13T09:00:00Z"
        scheduledAppointmentEndedAt:
          type: string
          format: date-time
          description: |
            End of the scheduled appointment window at this stop.

            Provide the time zone of the stop location if possible.
          example: "2020-10-13T11:00:00Z"
        arrivedAt:
          type: string
          format: date-time
          description: |
            Actual arrival date and time at this stop.

            Provide the time zone of the stop location if possible.
          example: "2020-10-13T09:15:00Z"
        departedAt:
          type: string
          format: date-time
          description: |
            Actual departure date and time from this stop.

            Provide the time zone of the stop location if possible.
          example: "2020-10-13T10:45:00Z"
      required:
        - country
    TmsConnector_CarrierProfile:
      type: object
      properties:
        profileId:
          type: string
          description: Profile id
          example: "13441524"
        companyName:
          type: string
          description: Company name
          example: Carggo
        legalName:
          type: string
          description: The official name of entity that owns a business
          example: Carggo
        mc:
          type: string
          description: Operating authority number assigned by the FMCSA to both carriers
            and brokers
          example: "122356"
        dot:
          type: string
          description: USDOT number assigned by the FMCSA to companies that operate
            commercial vehicles
          example: "87650005"
        scac:
          type: string
          description: Standard Carrier Alpha Code to identify vessel operating common
            carriers
          example: CGGK
        contact:
          $ref: "#/components/schemas/TmsConnector_ContactObject"
        status:
          $ref: "#/components/schemas/TmsConnector_ProfileStatus"
      required:
        - profileId
        - companyName
    TmsConnector_ContactObject:
      type: object
      description: Contact data
      properties:
        name:
          type: string
          description: Contact name
          example: John
        phoneNumber:
          type: string
          description: Contact phone number
          example: "121331343"
        email:
          type: string
          description: Contact email
          example: my@email.com
    TmsConnector_CarrierProfileForProvider:
      type: object
      properties:
        brokerId:
          type: string
          description: >
            Id of the company that you want the carrier to be imported in
            to.  (this is an id you receive when registering a new company with
            us)
          example: 6F9619FF-8B86-D011-B42D-00CF4FC964FF
      required:
        - brokerId
      allOf:
        - $ref: "#/components/schemas/TmsConnector_CarrierProfile"
    TmsConnector_ImportProfileResponse:
      type: object
      properties:
        id:
          type: string
          description: Id of the profile used to identify it in our platform
          example: c6447366-9700-4851-854b-2bb41f03cde0
        profileId:
          type: string
          description: Id of the profile provided by the client in the import request
          example: pr0-003
        status:
          type: string
          enum:
            - CREATED
            - UPDATED
          description: >
            Result of the profile import operation: 

            * CREATED - means that a new profile was created 

            * UPDATED - means that a profile with the same profileId was found and updated
          example: CREATED
      required:
        - id
        - profileId
        - status
    TmsConnector_ShipperProfile:
      type: object
      properties:
        profileId:
          type: string
          description: Profile id
          example: "13441524"
        companyName:
          type: string
          description: Company name
          example: Carggo
        legalName:
          type: string
          description: The official name of entity that owns a business
          example: Carggo
        contact:
          $ref: "#/components/schemas/TmsConnector_ContactObject"
        accountManager:
          type: string
          description: Shipper account manager on the broker side
          example: JAMES
        status:
          $ref: "#/components/schemas/TmsConnector_ProfileStatus"
        userGroupId:
          type: string
          description: |
            A unique identifier (id) of a user group, 
            that this profile belongs to. e.g. Main company or an Agency
          example: Main office
      required:
        - profileId
        - companyName
    TmsConnector_ShipperProfileForProvider:
      type: object
      properties:
        brokerId:
          type: string
          description: >
            Id of the company that you want the shipper to be imported in
            to.  (this is an id you receive when registering a new company with
            us)
          example: 6F9619FF-8B86-D011-B42D-00CF4FC964FF
      required:
        - brokerId
      allOf:
        - $ref: "#/components/schemas/TmsConnector_ShipperProfile"
    TmsConnector_Accessorials:
      type: array
      description: Accessorial list
      items:
        $ref: "#/components/schemas/TmsConnector_Accessorial"
    TmsConnector_Accessorial:
      type: object
      nullable: true
      description: Contains load accessorial information like name and costs
      properties:
        name:
          type: string
          description: Accessorial name
          example: Overweight
        shipperCost:
          type: number
          description: Shipper's flat cost for this accessorial
          example: 200
        carrierCost:
          type: number
          description: Carrier's flat cost for this accessorial
          example: 0
      required:
        - name
    TmsConnector_ProfileStatus:
      type: string
      description: |
        Signifies whether the imported profile is in Active or Inactive status
      enum:
        - ACTIVE
        - INACTIVE
      example: ACTIVE
      default: ACTIVE
    TmsConnector_Error:
      type: object
      description: A common api error object
      properties:
        code:
          type: string
          description: unique string identifier of the error
        message:
          type: string
          description: human readable error message
      required:
        - code
        - message
      example:
        code: invalid_request
        message: Your ClientId is invalid
    TmsConnector_TransportTypeGroup:
      type: string
      description: Transport type group
      enum:
        - VAN
        - REEFER
        - FLATBED
        - HOTSHOT
        - OTHER
      example: VAN
    TmsConnector_PricingTypeGroup:
      type: string
      description: |
        How this shipment was priced to the shipper in the following groupings
        (CONTRACT, SPOT, or OTHER)
      enum:
        - CONTRACT
        - SPOT
        - OTHER
      example: SPOT
    TmsConnector_ResponseMessage:
      type: object
      properties:
        commonResponse:
          type: string
          x-enum-varnames:
            - not_readable_message
            - access_forbidden
            - item_not_found
            - request_timeout
            - request_validation
            - parse_error
            - internal_error
            - access_forbidden_companyId
            - method_not_allowed
            - missing_required_parameter
          enum:
            - "Body request is not readable : %s"
            - Access is forbidden
            - Item not found
            - Request timeout after {} sec
            - You have one or more errors in request structure
            - "Text '%s' could not be parsed in field: %s"
            - Internal server error
            - companyId in JWT token is not equals importCompanyId in request
              body
            - Method not allowed
            - Missing required parameter
        serviceResponse:
          type: string
    TmsConnector_RequestValidationError:
      type: object
      description: Request validation error
      properties:
        field:
          type: string
          description: Name of the field that did not pass validation
          example: transportType
        message:
          type: string
          description: Human readable error mesage explaining why validation failed
          example: SpaceXDragon transportType is not supported. Valid values are [VAN,
            FLATBED, ...]
        value:
          type: string
          nullable: true
          description: Value of the field that did not pass validation
          example: SpaceXDragon
      required:
        - field
        - message
    TmsConnector_Error422UnprocessableEntityMulti:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        errors:
          type: array
          description: list of errors
          items:
            $ref: "#/components/schemas/TmsConnector_RequestValidationError"
      required:
        - code
        - message
        - errors
      example:
        code: request_validation
        message: You have one or more errors in request structure
        errors:
          - field: carrierName
            message: field contains wrong data type (int), should be string
            value: "22"
          - field: shipperId
            message: "shipperId: must not be null"
            value: null
          - field: loadSource.loadId
            message: "loadId: must not be null"
            value: null
  parameters:
    Prediction_UserHeader:
      in: header
      name: X-GS-User
      schema:
        type: string
      description: |
        Currently logged in user. Used in cases where this information is 
        not available in the token e.g. web-portable, api integration, etc.
      example: kalex@greenscreens.ai
