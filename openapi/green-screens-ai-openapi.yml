info:
  title: Triumph Intelligence Connect
  x-logo:
    url: https://static.greenscreens.ai/main-logo.svg
    backgroundColor: "#fafafa"
    altText: Triumph Intelligence
  description: >
    # Authentication



    Triumph Intelligence API offers OAuth2 Bearer JWT token based authentication.



    OAuth2 - an open protocol to allow secure authorization in a simple 

    and standard method from web, mobile and desktop applications.



    # 



    # 



    # Direct link integration with Triumph Intelligence


    One of the simplest ways to integrate Triumph Intelligence in to your app is by using the 

    direct link method.


    Link format:

        https://intelligence.triumph.io/rates?originZip={}&destinationZip={}&transportType={}

    * originZip - 5 digit USA ZIP code of the origin point


    * destinationZip - 5 digit USA ZIP code of the destination point


    * transportType - one of supported equipment types VAN, REEFER or FLATBED


    * OPTIONAL: pickupDate - pickup date string in ISO format e.g. "2022-04-06T08:00:00.000+03:00" when not encoded


    * OPTIONAL: originCityState - city and state separated by a space symbol, signifying the origin point. 

    Can be used instead of originZip if you do not have a zip code of the location. 

    _Should not be used together with originZip._


    * OPTIONAL: destinationCityState - city and state separated by a space, signifying the destination point. 

    Can be used instead of destinationZip if you do not have a zip code of the location. 

    _Should not be used together with destinationZip._


    * OPTIONAL: customer - name of the customer company


    * OPTIONAL: commodity - description of the transported commodity


    * OPTIONAL: weight - weight of the load in lbs


    * OPTIONAL: deliveryDate - delivery date string in ISO format e.g. "2022-04-06T08:00:00.000+03:00" when not encoded


    * OPTIONAL: extraStops - any extra stops between origin and destination. Value is an array of strings with up to 10 elements

    in the format of `{order}_{type}_{country}_{address}` 

    types are `{numbers 0-9}_{CITY or ZIP}_{US or CA}_{if ZIP then 5+ digits, if CITY then city state string separated by space}`


    Examples (don't forget to encode the url):

        https://intelligence.triumph.io/rates?originZip=12345&destinationZip=62345&transportType=VAN

        https://intelligence.triumph.io/rates?originCityState=Wausau%20WI&destinationCityState=Evansville%20IN&transportType=VAN

        https://intelligence.triumph.io/rates?originZip=12345&destinationCityState=Evansville%20IN&transportType=VAN

        https://intelligence.triumph.io/rates?originZip=12345&destinationZip=62345&extraStops=0_ZIP_US_28086&extraStops=1_CITY_US_Portland%20OR&transportType=VAN

    Example usage:

        <button
          onclick="location.href='https://intelligence.triumph.io/rates?destinationZip=62345&originZip=12345&transportType=VAN'"
          type="button">Quote new lane
        <button>


    # 



    # 



    # Services and endpoints


    The most versatile (and involving the most work) way of integration is by using our API directly.

    Below you can find a list of servises and endpoints available for usage.
