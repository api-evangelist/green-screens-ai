              examples:
                error403Example:
                  value:
                    code: access_forbidden
                    message: Access is forbidden
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketIntelligence_Error"
              examples:
                error404Example:
                  value:
                    code: item_not_found
                    message: Item not found
        "429":
          description: Too Many Requests
