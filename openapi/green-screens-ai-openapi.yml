          example: Pro#1234
        currency:
          type: string
          description: Requested currency. Format is ISO 4217.
          example: USD
        targetBuyRate:
          type: number
          description: Target buy rate (per mile, fuel included).
          example: 2.24
        lowBuyRate:
          type: number
          description: Low boundary of the buy rate (per mile, fuel included)
          example: 2.11
        highBuyRate:
          type: number
          description: High boundary of the buy rate (per mile, fuel included)
          example: 2.5
        startBuyRate:
          type: number
          description: |
            Suggested starting buy rate 
            for negotiations with the carrier (per mile, fuel included)
          example: 2.07
        distance:
          type: number
          description: Total distance of the trip (in miles)
          example: 289
        confidenceLevel:
          type: integer
          minimum: 0
          maximum: 100
          description: |
            How confident the system is in the prediction it is making. 

            From 0 - lowest possible confidence\
            To 100 - highest possible confidence
          example: 65
        notes:
          $ref: "#/components/schemas/Prediction_RateNotes"
      required:
        - id
        - dateTime
        - userEmail
        - transportType
        - originCity
        - originState
        - destinationCity
        - destinationState
        - pickupDateTime
        - tag
        - currency
        - targetBuyRate
        - lowBuyRate
        - highBuyRate
        - startBuyRate
        - distance
        - confidenceLevel
