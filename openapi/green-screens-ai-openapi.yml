  /quotes:
    get:
      tags:
        - Quotes
      summary: Get quotes
      description: Get quotes
      operationId: quotesGetAll
      security:
        - Quotes_bearerAuth: []
      parameters:
        - in: query
          name: createdDateFrom
          description: \'quote created date >= value\' filter
          schema:
            type: string
            format: date
            example: "2019-09-30"
        - in: query
          name: createdDateTo
          description: \'quote created date <= value\' filter
          schema:
            type: string
            format: date
            example: "2019-12-30"
        - in: query
          name: page
          description: |
            The page to return items from. 
            Used for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
            example: 5
        - in: query
          name: perPage
          description: |
            The amount of items per page. 
            Used for pagination
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 20
            example: 30
        - in: query
          name: currency
          schema:
            type: string
            enum:
              - USD
              - CAD
            description: >
              Currency code in ISO 4217 format (three letter code, e.g. USD)


              _If not provided, defaults to the currency set in the profile 

              of currently authenticated user (or currently authenticated company 

              if there is no user or user profile setting)_
            example: USD
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotes_QuotesResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotes_Error"
              examples:
                error400Example:
                  value:
                    code: missing_required_parameter
                    message: Your request was missing a {par_name} parameter
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotes_Error"
              examples:
                error403Example:
                  value:
                    code: access_forbidden
                    message: Access is forbidden
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotes_Error"
              examples:
                error404Example:
                  value:
                    code: item_not_found
                    message: Item not found
        "422":
          description: Unprocessable Entity with multiple errors.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotes_Error422UnprocessableEntityMulti"
              examples:
                error422MultiExample:
                  value:
                    code: request_validation
                    message: You have one or more errors in request structure
                    errors:
                      - field: carrierName
                        message: field contains wrong data type (int), should be string
                        value: "22"
                      - field: shipperId
                        message: "shipperId: must not be null"
                        value: null
                      - field: loadSource.loadId
                        message: "loadId: must not be null"
                        value: null
        "429":
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotes_Error"
              examples:
                error429TooManyRequests:
                  value:
                    code: too_many_requests
                    message: Request limit exceeded
        "500":
          description: Unhandled server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotes_Error"
              examples:
                error500Example:
                  value:
                    code: internal_error
                    message: Internal server error
