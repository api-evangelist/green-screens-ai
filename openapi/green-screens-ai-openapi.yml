  /marketintelligence/negotiation-advice:
    get:
      tags:
        - MarketIntelligence
      summary: Negotiation advice for provided lane
      description: |
        Negotiation advice for provided lane

        Parameter notes:
        * __region__ - defaults to ZIP if not provided
      security:
        - MarketIntelligence_bearerAuth: []
      operationId: negotiation
      parameters:
        - in: query
          name: transportType
          schema:
            type: string
            enum:
              - VAN
              - REEFER
              - FLATBED
              - HOTSHOT
            description: >
              Transport type


              If you would like Hotshot predictions, reach out to your CSM and DA. 

              The model will not work properly without your hotshot data effectively filtered and imported into the model.
            example: VAN
          required: true
        - in: query
          name: originCountry
          schema:
            type: string
            example: US
          description: |
            Origin country. 
            Two letter country code in ISO 3166-1 alpha-2 format
        - in: query
          name: originState
          schema:
            type: string
            example: NY
          description: Origin state
        - in: query
          name: originCity
          schema:
            type: string
            example: Schenectady
          description: Origin city
        - in: query
          name: originZip
          schema:
            type: string
            example: "12345"
          description: Origin area zip
          required: true
        - in: query
          name: destinationCountry
          schema:
            type: string
            example: US
          description: |
            Destination country. 
            Two letter country code in ISO 3166-1 alpha-2 format
        - in: query
          name: destinationState
          schema:
            type: string
            example: IL
          description: Destination state
        - in: query
          name: destinationCity
          schema:
            type: string
            example: Chicago
          description: Destination city
        - in: query
          name: destinationZip
          schema:
            type: string
            example: "60636"
          description: Destination area zip
          required: true
        - in: query
          name: hasExtraStops
          schema:
            type: boolean
            example: true
            description: |
              Signifies whether the requested lane has extra stops or not.

              If true, multistop loads will be included during calculations.
            default: false
        - in: query
          name: pickUpDateTime
          schema:
            type: string
            format: date-time
            example: "2020-01-11T16:00:00Z"
          description: PickUp date time
          required: false
        - in: query
          name: currency
          schema:
            type: string
            example: USD
          description: Code of the currency that you want the response to be in. Format is
            ISO 4217
          required: false
        - in: query
          name: region
          schema:
            type: string
            enum:
              - CITY
              - CITY_ZIP
              - ZIP_CITY
              - ZIP
              - 3DZIP
              - KMA
            description: >
              Determines the size of the area around the origin and destination
              points, 

              that will be searched for the related data.

              * CITY - narrow, city wide, area

              * ZIP - narrow, five digit zip, area

              * 3DZIP - medium, short zip, area

              * KMA - big, market wide, area

              * CITY_ZIP - a special option that sets origin area to CITY and destination area to ZIP

              * ZIP_CITY - a special option that sets origin area to ZIP and destination area to CITY
            example: ZIP
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketIntelligence_NegotiationResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketIntelligence_Error"
              examples:
                error400Example:
                  value:
                    code: missing_required_parameter
                    message: Your request was missing a {par_name} parameter
        "401":
          description: Unauthenticated
