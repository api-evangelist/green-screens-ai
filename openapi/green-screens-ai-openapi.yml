  /bids/recent:
    get:
      tags:
        - Bids
      summary: Get ten most recent bids for a lane
      description: Get ten most recent bids for a lane
      operationId: recentBids
      security:
        - Bids_bearerAuth: []
      parameters:
        - in: query
          name: transportType
          schema:
            type: string
            enum:
              - VAN
              - REEFER
              - FLATBED
              - HOTSHOT
            description: Transport type
            example: VAN
          required: true
        - in: query
          name: originCountry
          schema:
            type: string
            example: US
          description: |
            Origin country. 
            Two letter country code in ISO 3166-1 alpha-2 format
        - in: query
          name: originState
          schema:
            type: string
            description: Origin state
            example: NY
        - in: query
          name: originCity
          schema:
            type: string
            description: Origin city
            example: Schenectady
        - in: query
          name: originZip
          schema:
            type: string
            example: "12345"
            description: Origin area zip
          required: true
        - in: query
          name: destinationCountry
          schema:
            type: string
            example: US
          description: |
            Destination country. 
            Two letter country code in ISO 3166-1 alpha-2 format
        - in: query
          name: destinationState
          schema:
            type: string
            description: Destination state
            example: IL
        - in: query
          name: destinationCity
          schema:
            type: string
            description: Destination city
            example: Chicago
        - in: query
          name: destinationZip
          schema:
            type: string
            example: "60636"
            description: Destination area zip
          required: true
        - in: query
          name: hasExtraStops
          schema:
            type: boolean
            example: true
            description: |
              Signifies whether the requested lane has extra stops or not.

              If true, multistop loads will be included during calculations.
            default: false
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date
            example: "2019-09-30"
            description: Date range for bids created from
          required: true
        - in: query
          name: region
          schema:
            type: string
            enum:
              - CITY
              - CITY_ZIP
              - ZIP_CITY
              - ZIP
              - 3DZIP
              - KMA
            description: >
              Determines the size of the area around the origin and destination
              points, 

              that will be searched for the related data.

              * CITY - narrow, city wide, area

              * ZIP - narrow, five digit zip, area

              * 3DZIP - medium, short zip, area

              * KMA - big, market wide, area

              * CITY_ZIP - a special option that sets origin area to CITY and destination area to ZIP

              * ZIP_CITY - a special option that sets origin area to ZIP and destination area to CITY
            example: ZIP
          required: true
        - in: query
          name: currency
          schema:
            type: string
            enum:
              - USD
              - CAD
            description: >
              Currency code in ISO 4217 format (three letter code, e.g. USD)


              _If not provided, defaults to the currency set in the profile 

              of currently authenticated user (or currently authenticated company 

              if there is no user or user profile setting)_
            example: USD
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bids_RecentBidsResponse"
        "400":
          $ref: "#/paths/~1bids/get/responses/400"
        "401":
          $ref: "#/paths/~1bids/get/responses/401"
        "403":
          $ref: "#/paths/~1bids/get/responses/403"
        "404":
          $ref: "#/paths/~1bids/get/responses/404"
        "422":
          $ref: "#/paths/~1bids/get/responses/422"
        "429":
          $ref: "#/paths/~1bids/get/responses/429"
        "500":
          $ref: "#/paths/~1bids/get/responses/500"
