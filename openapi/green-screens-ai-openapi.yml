          type: string
          description: Key of the bid which you want to accept
          example: c5d1cfa8-228b-11eb-adc1-0242ac120002
        bidCost:
          type: number
          description: Bid rate from user
          example: 1000.5
        carrierName:
          type: string
          description: Carrier company name
          example: Carrierr Transportation
        carrierMC:
          type: string
          description: Carrier MC number
          example: "888015"
        carrierComment:
          type: string
          description: Comment for broker
          example: Looks good
        currency:
          $ref: "#/components/schemas/Bids_Currency"
      required:
        - key
        - bidCost
        - carrierName
    Bids_BidsSendRequest:
      type: object
      properties:
        userEmail:
          type: string
          description: Email of the user who will be the owner/creator of the bid
          example: buddy@greenscreens.ai
        carriers:
          type: array
          description: |
            List of carriers to whom the bid request should be sent to
          items:
            $ref: "#/components/schemas/Bids_BidsSendRequestCarrier"
        carrierEmailList:
          type: array
          items:
            type: string
            nullable: true
          deprecated: true
          minItems: 0
          maxItems: 500
          description: |
            List of emails that the bid request should be sent to

            __Deprecated: use `carriers` field instead__
          example:
            - carrier1@mail.com
            - carrier2@mail.com
            - carrier3@mail.com
        carrierPhoneList:
          type: array
          items:
            type: string
            nullable: true
          deprecated: true
          minItems: 0
          maxItems: 500
          description: >
            List of phone numbers that the bid request should be sent to as a
            message.


            __This feature only works if you have 'TextLocate' integration enabled for your company.__


            _Valid phone number is a string with ten digits in it._


            __Deprecated: use `carriers` field instead__
          example:
            - "8456951387"
            - "7456951583"
            - "2458951391"
        origin:
          $ref: "#/components/schemas/Bids_Address"
        destination:
          $ref: "#/components/schemas/Bids_Address"
        extraStops:
          $ref: "#/components/schemas/Bids_StopsInput"
        pickupDateTime:
          type: string
          format: date-time
          description: >
            Pick up date with time in time zone of the pick up location.


            The time zone you provide will be ignored, 

            so you have to make sure that the day and the hours are exactly 

            those that you want to store in our system. 


            e.g. if the load has to be delivered at 16:00 in the time zone

            of the drop off point, you have to send us 16:00 in this string.


            e.g. if you send 2020-10-13T16:00:00Z in utc, our system will

            cut off the UTC time zone, and attach the time zone of the pick up point,

            but the date and time will still stay 2020-10-13T16:00:00.
          example: "2020-10-13T16:00:00Z"
        deliveredDateTime:
          type: string
          format: date-time
          description: >
            Delivered date with time in time zone of drop off location.


            The time zone you provide will be ignored, 

            so you have to make sure that the day and the hours are exactly 

            those that you want to store in our system. 


            e.g. if the load has to be delivered at 16:00 in the time zone

            of the drop off point, you have to send us 16:00 in this string.


            e.g. if you send 2020-10-13T16:00:00Z in utc, our system will

            cut off the UTC time zone, and attach the time zone of the pick up point,

            but the date and time will still stay 2020-10-13T16:00:00
          example: "2020-10-13T16:00:00Z"
        loadProNumber:
          type: string
          description: Internal load pro number
          example: Pro#111111
        weight:
          type: number
          format: float
          description: Total cargo weight in lb
          example: 20000
        commodity:
          type: string
          description: commodity description in free form
          example: Steel racks
        brokerComment:
          type: string
          description: Comment for carrier
          example: Please, be carefully with my load
        transportType:
          $ref: "#/components/schemas/Bids_TransportType"
      required:
        - carrierName
        - origin
        - destination
        - transportType
    Bids_BidsSendRequestCarrier:
      type: object
      description: |
        Describes a carrier 
        and how a bid request to that carrier should be made
      properties:
        carrierInfo:
          $ref: "#/components/schemas/Bids_BidsSendRequestCarrierCarrierInfo"
        carrierInfoSource:
          type: string
          description: The source of the carrier info
          enum:
            - MANUAL_ENTRY
            - CLIENT_DATA_CARRIER_SEARCH
            - CLIENT_DATA_BIDS
            - CLIENT_DATA_TOP_CARRIERS
            - STRATEGIC_CAPACITY
            - HIGHWAY
            - CARGO_CHIEF
            - YAT
            - TRUCKSTOP
            - CARRIER_SOURCE
            - CHAINE
            - OTHER
          example: HIGHWAY
        sendRequestTo:
          type: array
          uniqueItems: true
          minItems: 1
          description: >
            List of channels that bid requests should be sent through.


            * CARRIER_INFO_PHONE - a bid request will be sent to

            the phone number provided in the `carrierInfo.phone` field. 

            __This only works if you have SMS bids functionality enabled for your company__

            * CARRIER_INFO_EMAIL - a bid request will be sent to

            the email address provided in the `carrierInfo.email` field


            If several values are provided then several bid requests will be

            created and sent through appropriate channels
          items:
            type: string
            description: The channel that the bid request can be sent through
            enum:
              - CARRIER_INFO_EMAIL
              - CARRIER_INFO_PHONE
            example: CARRIER_INFO_EMAIL
      required:
        - sendRequestTo
