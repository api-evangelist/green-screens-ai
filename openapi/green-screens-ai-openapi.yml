            e.g. if you send 2020-10-13T16:00:00Z in utc, our system will

            cut off the UTC time zone, and attach the time zone of the pick up point,

            but the date and time will still stay 2020-10-13T16:00:00
          example: "2020-10-13T16:00:00Z"
        bidDateTime:
          type: string
          format: date-time
          description: The date and time when the bid was created
          example: "2020-10-11T16:00:00Z"
