  /prediction/history:
    get:
      tags:
        - Prediction
      summary: Lane rate prediction history
      description: >
        Lane rate prediction request/response history on the given date.

        Due to resource limitation search is restricted to the last 30 days period.

        Requests outside of this period will return 400 response code with corresponding error code.

        Results sorted from newest to oldest.
      security:
        - Prediction_bearerAuth: []
      operationId: predictionHistory
      parameters:
        - in: query
          name: date
          schema:
            type: string
            format: date
            description: All rate requests made on this day will be returned. The date must
              be within the last 30 days from today. ISO date format
              (YYYY-MM-DD).
            example: "2021-09-21"
          required: true
      responses:
        "200":
          description: Success
