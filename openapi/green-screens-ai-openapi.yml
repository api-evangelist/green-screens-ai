externalDocs:
  description: Triumph Intelligence
  url: https://intelligence.triumph.io
paths:
  /auth/token:
    servers:
      - url: https://testapi.greenscreens.ai/v1
        description: Testing server (dev environment)
      - url: https://sandboxapi.greenscreens.ai/v1
        description: Sandbox server (as stable as production, but has no data)
      - url: https://api.greenscreens.ai/v1
        description: Production server (uses live data)
    post:
      tags:
        - Auth
      security: []
      summary: Auth token
      description: >
        The request for the access token should look like this.

        ```

        curl -X POST "https://testapi.greenscreens.ai/v1/auth/token" -H "accept: application/json" \

        -H "Content-Type: application/x-www-form-urlencoded" \

        -d "grant_type=client_credentials&client_id=external-app&client_secret=78aaff56-7b86-4c92-9a1d-355f167c0619"

        ```

        You should replace `client_id` and `client_secret` with id and secret provided to you by greenscreens. 


        ---

        If an access_token that you use expires, or you receive an `unauthenticated` error,

        your application will need to obtain a new access_token.
      operationId: authToken
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  enum:
                    - client_credentials
                  description: Type of authorization flow, in this case should always be
                    `client_credentials`
                  example: client_credentials
                client_id:
                  type: string
                  description: Client id provided by greenscreens
                  example: external-app
                client_secret:
                  type: string
                  description: Client secret provided by greenscreens
                  example: 78aaff56-7b86-4c92-9a1d-355f167c0619
              required:
                - grant_type
                - client_id
                - client_secret
            example:
              grant_type: client_credentials
              client_id: external-app
              client_secret: 78aaff56-7b86-4c92-9a1d-355f167c0619
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: Access token
                  expires_in:
                    type: integer
                    description: Expiration of access token
                  refresh_expires_in:
                    type: integer
                    description: Expiration of refresh token
                  token_type:
                    type: string
                    description: Token type
                  not-before-policy:
                    type: integer
                    description: Not before policy
                  scope:
                    type: string
                    description: scope
                required:
                  - access_token
                  - expires_in
                  - token_type
                  - not-before-policy
                  - scope
              example:
                access_token: eyJhbGciOiJSUzI1NiIsInR5cCIgOiAiSldUIiwia2lkIiA6ICI3cmFncld0MlJuVjZaeFdZa2JLZDktOGZYV202UlRCU3Q0WE1IYWdpZFQwIn0..ngQ15qlArqFyQ-fRJZcHGBFZQBWsG2oXgJqsOpY8ECpQN5-VgX2zlWPATZ469qXEmFEdwGfsadk62T6fu7Qxf1elTFSw5OqXHAWKPs1myB3E-wxDe9zRZdnFm72G5uoVHyLhPwbInWTTZNzCrISQVUQq1UbcQ5K0OZxQSThTgh232qPNjl6J1KekjvAkottMTCugv0Rl1MxvCnLyyYPyKl2EACCJShJ0-xjLaU1sH68Jnt7kPC8HCfqvZUj2c9YtBKwBTkOhriPQWHEQLC8g0GMSV3Q19_fCuAkqo9qd2spLyi7K9hNI1PNSESOSPBVNPqVmip712YdtlEUE8OQ0wQ
                expires_in: 3600
                refresh_expires_in: 0
                token_type: Bearer
                not-before-policy: 1631698006
                scope: ""
        "401":
          description: Authorization information is missing or invalid
  /analytics/lane-top-carriers:
    get:
      tags:
        - Analytics
      operationId: analyticsLaneTopCarriers
      summary: Top carriers
      description: Returns a list of top carriers for a provided lane
      security:
        - Analytics_bearerAuth: []
      parameters:
        - in: query
          name: transportType
          schema:
            type: string
            enum:
              - VAN
              - REEFER
              - FLATBED
              - HOTSHOT
            description: >
              Transport type


              If you would like Hotshot predictions, reach out to your CSM and DA. 

              The model will not work properly without your hotshot data effectively filtered and imported into the model.
            example: VAN
          required: true
        - in: query
          name: originCountry
          schema:
            type: string
            example: US
          description: |
            Origin country. 
            Two letter country code in ISO 3166-1 alpha-2 format
        - in: query
          name: originState
          schema:
            type: string
            example: NY
          description: Origin state
          required: true
        - in: query
          name: originCity
          schema:
            type: string
            example: Schenectady
          description: Origin city
          required: true
        - in: query
          name: originZip
          schema:
            type: string
            example: "12345"
          description: Origin area zip
          required: true
        - in: query
          name: destinationCountry
          schema:
            type: string
            example: US
          description: |
            Destination country. 
            Two letter country code in ISO 3166-1 alpha-2 format
        - in: query
          name: destinationState
          schema:
            type: string
            example: IL
          description: Destination state
          required: true
        - in: query
          name: destinationCity
          schema:
            type: string
            example: Chicago
          description: Destination city
          required: true
        - in: query
          name: destinationZip
          schema:
            type: string
            example: "60636"
          description: Destination area zip
          required: true
        - in: query
          name: hasExtraStops
          schema:
            type: boolean
            example: true
            description: |
              Signifies whether the requested lane has extra stops or not.

              If true, multistop loads will be included during calculations.
            default: false
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date
            example: "2019-09-30"
          description: >
            Start date of a period for which you want to calculate top
            carriers. 

            In ISO format (YYYY-MM-DD). 


            End date of this period is the current date.
          required: true
        - in: query
          name: region
          schema:
            type: string
            enum:
              - CITY
              - CITY_ZIP
              - ZIP_CITY
              - ZIP
              - 3DZIP
              - KMA
            description: >
              Determines the size of the area around the origin and destination
              points, 

              that will be searched for the related data.

              * CITY - narrow, city wide, area

              * ZIP - narrow, five digit zip, area

              * 3DZIP - medium, short zip, area

              * KMA - big, market wide, area

              * CITY_ZIP - a special option that sets origin area to CITY and destination area to ZIP

              * ZIP_CITY - a special option that sets origin area to ZIP and destination area to CITY
            example: ZIP
          required: true
        - in: query
          name: currency
          schema:
            type: string
            example: USD
          description: >
            Code of the currency that you want the response to be in.

            Format is ISO 4217.

            If not provided, defaults to the currency set in the profile of currently authenticated user.
        - in: query
          name: sort
          schema:
            type: array
            items:
              type: string
          description: >
            Sorting descriptor in format `?sort={field},{asc|desc}`. 


            Multiple sort parameters are allowed and should look like this 

            `?sort=name,asc&sort=email,desc`.


            If multiple sort parameters are passed, the results will be sorted by all of them, 

            with priority decreasing from left to right.


            So in case of `?sort=name,asc&sort=volume,desc` results will be first sorted by 

            name in ascending order, and in cases where names are equal 

            results will be sorted by volume in descending order.


            By default carriers are sorted like this: 

            `numberOfLoads,desc & lastShippedDate,desc`.


            These response fields support sorting:

            ```

            carrierName

            carrierPhone

            carrierEmail

            carrierMC

            carrierDOT

            carrierSCAC

            numberOfLoads

            lastShippedDate

            averageCarrierRate

            minCarrierRate

            maxCarrierRate

            averageCarrierFlatRate

            minCarrierFlatRate

            maxCarrierFlatRate

            averageCarrierMarginPercent

            ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analytics_AnalyticsLaneTopCarriersResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                description: A common api error object
                properties:
                  code:
                    type: string
                    description: unique string identifier of the error
                  message:
                    type: string
                    description: human readable error message
                required:
                  - code
                  - message
                example:
                  code: invalid_request
                  message: Your ClientId is invalid
              examples:
                error400Example:
                  value:
                    code: missing_required_parameter
                    message: Your request was missing a {par_name} parameter
        "401":
          description: Unauthenticated
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/paths/~1analytics~1lane-top-carriers/get/responses/400/content/applica\
                  tion~1json/schema"
              examples:
                error403Example:
                  value:
                    code: access_forbidden
                    message: Access is forbidden
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/paths/~1analytics~1lane-top-carriers/get/responses/400/content/applica\
                  tion~1json/schema"
              examples:
                error404Example:
                  value:
                    code: item_not_found
                    message: Item not found
        "422":
          description: Unprocessable Entity with multiple errors.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
                  errors:
                    type: array
                    description: list of errors
                    items:
                      type: object
                      description: Request validation error
                      properties:
                        field:
                          type: string
                          description: Name of the field that did not pass validation
                          example: transportType
                        message:
                          type: string
                          description: Human readable error mesage explaining why validation failed
                          example: SpaceXDragon transportType is not supported. Valid values are [VAN,
                            FLATBED, ...]
                        value:
                          type: string
                          nullable: true
                          description: Value of the field that did not pass validation
                          example: SpaceXDragon
                      required:
                        - field
                        - message
                required:
                  - code
                  - message
                  - errors
                example:
                  code: request_validation
                  message: You have one or more errors in request structure
                  errors:
                    - field: carrierName
                      message: field contains wrong data type (int), should be string
                      value: "22"
                    - field: shipperId
                      message: "shipperId: must not be null"
                      value: null
                    - field: loadSource.loadId
                      message: "loadId: must not be null"
                      value: null
              examples:
                error422MultiExample:
                  value:
                    code: request_validation
                    message: You have one or more errors in request structure
                    errors:
                      - field: carrierName
                        message: field contains wrong data type (int), should be string
                        value: "22"
                      - field: shipperId
                        message: "shipperId: must not be null"
                        value: null
                      - field: loadSource.loadId
                        message: "loadId: must not be null"
                        value: null
        "429":
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: "#/paths/~1analytics~1lane-top-carriers/get/responses/400/content/applica\
                  tion~1json/schema"
              examples:
                error429TooManyRequests:
                  value:
                    code: too_many_requests
                    message: Request limit exceeded
        "500":
          description: Unhandled server error
          content:
            application/json:
              schema:
                $ref: "#/paths/~1analytics~1lane-top-carriers/get/responses/400/content/applica\
                  tion~1json/schema"
              examples:
                error500Example:
                  value:
                    code: internal_error
                    message: Internal server error
      x-codeSamples:
        - lang: Node + Request
          source: >
            const request = require('request');


            const options = {
              method: 'GET',
              url: 'https://testapi.greenscreens.ai/v1/analytics/lane-top-carriers',
              qs: {
                transportType: 'VAN',
                originCountry: 'US',
                originState: 'NY',
                originCity: 'Schenectady',
                originZip: '12345',
                destinationCountry: 'US',
                destinationState: 'IL',
                destinationCity: 'Chicago',
                destinationZip: '60636',
                hasExtraStops: 'true',
                dateFrom: '2019-09-30',
                region: 'ZIP',
                currency: 'USD',
                sort: 'SOME_ARRAY_VALUE'
              },
              headers: {Authorization: 'Bearer REPLACE_BEARER_TOKEN'}
            };


            request(options, function (error, response, body) {
              if (error) throw new Error(error);

              console.log(body);
            });
        - lang: Python + Requests
          source: >-
            import requests


            url = "https://testapi.greenscreens.ai/v1/analytics/lane-top-carriers"


            querystring = {"transportType":"VAN","originCountry":"US","originState":"NY","originCity":"Schenectady","originZip":"12345","destinationCountry":"US","destinationState":"IL","destinationCity":"Chicago","destinationZip":"60636","hasExtraStops":"true","dateFrom":"2019-09-30","region":"ZIP","currency":"USD","sort":"SOME_ARRAY_VALUE"}


            headers = {"Authorization": "Bearer REPLACE_BEARER_TOKEN"}


            response = requests.request("GET", url, headers=headers, params=querystring)


            print(response.text)
        - lang: Php + Curl
          source: >-
            <?php


            $curl = curl_init();


            curl_setopt_array($curl, [
              CURLOPT_URL => "https://testapi.greenscreens.ai/v1/analytics/lane-top-carriers?transportType=VAN&originCountry=US&originState=NY&originCity=Schenectady&originZip=12345&destinationCountry=US&destinationState=IL&destinationCity=Chicago&destinationZip=60636&hasExtraStops=true&dateFrom=2019-09-30&region=ZIP&currency=USD&sort=SOME_ARRAY_VALUE",
              CURLOPT_RETURNTRANSFER => true,
