    Prediction_PredictionTFXPostedRateAssessment:
      type: string
      enum:
        - ""
        - Fair
        - Good
        - Great
    Prediction_RateStopArray:
      type: array
      description: List of load stops
      minItems: 2
      items:
        $ref: "#/components/schemas/Prediction_RateStop"
      example:
        - order: 0
          country: US
          city: Chicago
          state: IL
          zip: "60611"
        - order: 1
          country: US
          city: Dallas
          state: TX
          zip: "75204"
    Prediction_RateStop:
      type: object
      description: Load stop data
      properties:
        order:
          type: integer
          description: Stop order, starting from 0
          example: 0
        country:
          type: string
          description: Two letter country code in ISO 3166-1 alpha-2 format
          example: US
        city:
          type: string
          description: City name
          example: Chicago
        state:
          type: string
          description: Two letter state code
          example: IL
        zip:
          type: string
          description: >
            Zip code. 


            *Not required, but should be provided if possible, as it will improve prediction accuracy.*
          example: "60636"
      example:
        order: 0
        country: US
        city: Chicago
        state: IL
        zip: "60611"
      required:
        - order
        - city
        - state
    Prediction_RateNotes:
      type: object
      description: >
        Map of notes about the rate. 

        This is used to return additional information (notes/comments) about the rate, 

        that is difficult to convey otherwise.


        If a property of this object is present and it's value is not null 

        then the note is considered applicable
      properties:
        shortHaulRateInaccurate:
          type: object
          description: |
            Signifies that the predicted rate might be inaccurate 
            because short hauls, are not supported well
          properties:
            distanceLessThan:
              type: number
              description: |
                A load is considered a Short Haul 
                if it's mileage is lower than this number
              example: 30
          required:
            - distanceLessThan
        multistopDistanceOutlierRateInaccurate:
          type: object
          description: >
            Signifies that the predicted rate might be inaccurate 

            because multistop hauls with distance much bigger or less than 

            the distance for the same lane single stop haul, are not supported well
          properties:
            allowedDistanceDifferenceRange:
              type: object
              description: >
                Describes the range of distance values that should not trigger
                this warning.

                Anything outside the minimum and the maximum 

                will be considered inaccurate. And will trigger this warning as a result
              properties:
                minimumPercentage:
                  type: number
                  description: |
                    Minimum distance difference percentage 
                    allowed for the prediction to be considered accurate.
                    If not present then there is no lower bound
                  example: 0
                maximumPercentage:
                  type: number
                  description: |
                    Maximum distance difference percentage
                    allowed for the prediction to be considered accurate.
                    If not present then there is no upper bound
                  example: 100
            singleStopDistance:
              type: number
              description: Distance (in miles) of a single stop haul for the same lane
              example: 570
          required:
            - allowedDistanceDifferenceRange
            - singleStopDistance
    Prediction_ErrorObject:
      type: object
      description: Error/Exception description
      properties:
        httpCode:
          type: integer
          description: Response code
          example: 424
        code:
          type: string
          description: unique string identifier of the error
          example: not_found_distance
        message:
          type: string
          description: Readable error message
          example: Not found route between locations
      required:
        - httpCode
        - code
        - message
    Prediction_Error:
      type: object
      description: A common api error object
      properties:
        code:
          type: string
          description: unique string identifier of the error
        message:
          type: string
          description: human readable error message
      required:
        - code
        - message
      example:
        code: invalid_request
        message: Your ClientId is invalid
    Prediction_TransportType:
      type: string
      enum:
        - VAN
        - REEFER
        - FLATBED
        - HOTSHOT
      description: >
        Transport type


        If you would like Hotshot predictions, reach out to your CSM and DA. 

        The model will not work properly without your hotshot data effectively filtered and imported into the model.
      example: VAN
    Prediction_Error422UnprocessableEntityMulti:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        errors:
          type: array
          description: list of errors
          items:
            type: object
            description: Request validation error
            properties:
              field:
                type: string
                description: Name of the field that did not pass validation
                example: transportType
              message:
                type: string
                description: Human readable error mesage explaining why validation failed
                example: SpaceXDragon transportType is not supported. Valid values are [VAN,
                  FLATBED, ...]
              value:
                type: string
                nullable: true
                description: Value of the field that did not pass validation
                example: SpaceXDragon
            required:
              - field
              - message
      required:
        - code
        - message
        - errors
      example:
        code: request_validation
        message: You have one or more errors in request structure
        errors:
          - field: carrierName
            message: field contains wrong data type (int), should be string
            value: "22"
          - field: shipperId
            message: "shipperId: must not be null"
            value: null
          - field: loadSource.loadId
            message: "loadId: must not be null"
            value: null
    Prediction_ResponseMessage:
      type: object
      properties:
        commonResponse:
          type: string
          x-enum-varnames:
            - not_readable_message
            - access_forbidden
            - item_not_found
            - request_timeout
            - request_validation
            - parse_error
            - internal_error
            - access_forbidden_companyId
            - method_not_allowed
            - missing_required_parameter
          enum:
            - "Body request is not readable : %s"
            - Access is forbidden
            - Item not found
            - Request timeout after {} sec
            - You have one or more errors in request structure
            - "Text '%s' could not be parsed in field: %s"
            - Internal server error
            - companyId in JWT token is not equals importCompanyId in request
              body
            - Method not allowed
            - Missing required parameter
        serviceResponse:
          type: string
    Pricing_PricingStatistics:
      type: object
      description: Statistical pricing percentages based on your historical load data
      properties:
        average:
          type: number
          description: Average pricing percentage
          example: 11
        minimum:
          type: number
          description: Minimum pricing percentage
          example: 10
        maximum:
          type: number
          description: Maximum pricing percentage
          example: 13
      required:
        - average
        - minimum
        - maximum
    Pricing_PricingStatisticsCalculation:
      type: object
      description: |
        Contains historical pricing statistics 
        and if possible a calculated `targetSellCost`
      properties:
        pricing:
          $ref: "#/components/schemas/Pricing_PricingStatistics"
        targetSellCost:
          type: number
          example: 1250
          description: |
            Flat target sell cost calculated by applying the rule
            to the provided flat buy cost
      required:
        - pricing
    Pricing_PricingPriorityRuleRequest:
      type: object
      properties:
        name:
          type: string
          description: Name of the rule
          example: Customer`s rule
        priority:
          type: integer
          description: Priority of the rule
          example: 3
        active:
          type: boolean
          description: Status of the rule
          example: false
        conditions:
          $ref: "#/components/schemas/Pricing_RuleRequestConditions"
        effects:
          $ref: "#/components/schemas/Pricing_PriorityRuleEffectsInput"
        pricingTypeGroup:
          $ref: "#/components/schemas/Pricing_PricingRuleGroup"
      required:
        - name
        - priority
        - active
        - conditions
        - effects
    Pricing_RuleRequestConditions:
      type: object
      description: |
        Conditions in which this rule is applicable.

        When multuple conditions are provided the rule is only applied 
        if all of them are met.
      properties:
        commodity:
          type: array
          description: >
            List of commodities to which the rule is applicable.

            At least one commodity from this list has to match for the rule to apply
          items:
            type: string
          example:
            - Apples
        confidenceLevel:
          $ref: "#/components/schemas/Pricing_ConfidenceLevelRange"
        customers:
          type: array
          description: >
            List of customers to which the rule is applicable. 

            At least one customer from this list has to match for the rule to apply.
          items:
            type: string
            description: Customer name
          example:
            - LTR and Co
            - CocaCola
            - Walmart
        lanes:
          type: array
          description: |
            List of lanes to which the rule is applicable. 
            At least one lane from this list has to match for the rule to apply.
          items:
            $ref: "#/components/schemas/Pricing_RuleRequestLane"
        lengthOfHaul:
          $ref: "#/components/schemas/Pricing_LengthOfHaulRange"
        matchingTime:
          $ref: "#/components/schemas/Pricing_MatchingTimeRange"
        transitTime:
          $ref: "#/components/schemas/Pricing_TransitTimeRange"
        transportTypes:
          type: array
          maxItems: 3
          description: >
            List of transport types to which the rule is applicable.

            At least one transport type from this list has to match for the rule to apply
          items:
            $ref: "#/components/schemas/Pricing_TransportType"
        users:
          type: array
          description: |
            List of users to whom the rule is applicable. 
            At least one user from this list has to match for the rule to apply
          items:
            type: string
        weight:
          $ref: "#/components/schemas/Pricing_WeightRange"
        stopsCount:
          $ref: "#/components/schemas/Pricing_StopsCountRange"
        mileageDifference:
          $ref: "#/components/schemas/Pricing_MileageDifferenceRange"
    Pricing_RuleRequestLane:
      type: object
      description: A lane that the rule is applicable to
      properties:
        origins:
          $ref: "#/components/schemas/Pricing_RuleRequestLocations"
        destinations:
          $ref: "#/components/schemas/Pricing_RuleRequestLocations"
      required:
        - origins
        - destinations
    Pricing_RuleRequestLocations:
      type: array
      description: A list of locations that the rule is applicable to
      items:
        $ref: "#/components/schemas/Pricing_RuleRequestLocation"
      example:
        - type: ANYWHERE
        - type: STATE
          country: US
          state: IL
        - type: CITY
          country: US
          state: IL
          city: Chicago
        - type: MARKET
          country: US
          marketCode: NY_ALB
    Pricing_RuleRequestLocation:
      type: object
      description: Lane stop
      properties:
        type:
          type: string
          enum:
            - ANYWHERE
            - STATE
            - CITY
            - MARKET
          example: ANYWHERE
          description: |
            The location type. 

            For type ANYWHERE no fields are required.

            For type STATE - "country" and "state" fields are required.

            For type CITY - "country", "state" and "city" fields are required.

            For type MARKET - "country" and "marketCode" fields are required.
        country:
          type: string
          description: Two letter country code in ISO 3166-1 alpha-2 format
          example: US
        state:
          type: string
          description: State
          example: NY
        city:
          type: string
          description: City
          example: Schenectady
        marketCode:
          type: string
          description: Market code
          example: NY_ALB
      required:
        - type
    Pricing_PriorityRuleCalculation:
      type: object
